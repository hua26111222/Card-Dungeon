<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>卡牌地牢</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --void:#07050a;--s1:#100d14;--s2:#181420;--s3:#201a2c;--s4:#28223a;
  --crack:#352d45;--crack2:#4a3f62;
  --blood:#8b1a1a;--blood2:#6b1010;--blood3:#3d0808;
  --gore:#c0392b;--gore2:#e05040;
  --bone:#c8a96e;--bone2:#a07840;--bone3:#7a5820;
  --amber:#d4881a;--amber2:#a06010;
  --mold:#2d5a27;--slime:#5abf44;
  --ice:#3a5a8a;--frost:#7aaabf;
  --soul:#6a3a9a;--violet:#9a5abf;
  --ash:#8a8070;--ash2:#5a5048;--ash3:#302820;
  --text:#c8b89a;--text2:#8a7860;--text3:#5a4a3a;
  --fs:'ZCOOL XiaoWei','Noto Serif SC',serif;--fg:'Cinzel Decorative','ZCOOL XiaoWei',serif;--fm:'Courier New',monospace;
}
html,body{background:var(--void);color:var(--text);font-family:var(--fm);font-size:15px;min-height:100vh;overflow-x:hidden}
#app{max-width:900px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0px,rgba(0,0,0,.12) 1px,transparent 1px,transparent 24px),
    repeating-linear-gradient(90deg,rgba(0,0,0,.08) 0px,rgba(0,0,0,.08) 1px,transparent 1px,transparent 24px),var(--s1)}

/* HUD */
#hud{background:linear-gradient(180deg,#0d0a12 0%,#100d18 100%);border-bottom:1px solid var(--crack);
  box-shadow:0 2px 16px rgba(0,0,0,.9),inset 0 1px 0 rgba(200,169,110,.05);
  display:flex;align-items:stretch;flex-shrink:0;z-index:100;position:relative}
.hl{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 14px;
  border-right:1px solid var(--crack);background:linear-gradient(90deg,rgba(139,26,26,.1),transparent)}
.gn{font-family:var(--fg);font-size:17px;font-weight:900;color:var(--bone);letter-spacing:5px;
  text-shadow:0 0 24px rgba(200,169,110,.5),0 0 48px rgba(139,26,26,.3),2px 2px 0 #000}
.gc{font-size:12px;color:var(--text2);letter-spacing:1px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.hs{display:flex}.hss{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 10px;border-left:1px solid var(--crack);min-width:52px;gap:1px}
.hi{font-size:16px;line-height:1;filter:drop-shadow(0 0 5px currentColor)}
.hv{font-family:var(--fs);font-size:20px;font-weight:900;line-height:1;text-shadow:1px 1px 0 #000}
.hl2{font-size:11px;color:var(--text2);letter-spacing:2px;margin-top:1px}
.s-hp .hi,.s-hp .hv{color:var(--gore2);text-shadow:0 0 12px var(--blood),1px 1px 0 #000}
.s-ap .hi,.s-ap .hv{color:var(--frost);text-shadow:0 0 10px var(--ice),1px 1px 0 #000}
.s-g  .hi,.s-g  .hv{color:var(--amber);text-shadow:0 0 10px var(--bone3),1px 1px 0 #000}
.s-dr .hi,.s-dr .hv{color:var(--violet);text-shadow:0 0 10px var(--soul),1px 1px 0 #000}

/* 筹码栏 */
#tbar{display:none}
.tg{display:flex;align-items:center;gap:2px;padding-right:9px;margin-right:7px;border-right:1px solid var(--crack2)}
.tg:last-child{border:none;margin:0;padding:0}
.tl{font-size:7px;color:var(--text3);letter-spacing:2px;margin-right:3px;flex-shrink:0;font-style:italic}
.tok{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;font-size:8px;font-weight:900;border:1px solid;flex-shrink:0}
.th{background:var(--blood3);border-color:var(--blood2);color:var(--gore2);box-shadow:0 0 4px rgba(139,26,26,.5)}
.ta{background:var(--ice);border-color:var(--frost);color:var(--frost);box-shadow:0 0 3px rgba(58,90,138,.4);opacity:.7}
.tgo{background:rgba(100,75,15,.3);border-color:var(--bone3);color:var(--bone)}
.tov{font-size:8px;color:var(--text3);margin-left:2px;font-style:italic}

/* 词缀横幅 */
#mb{padding:5px 12px;border-bottom:1px solid;display:none;align-items:center;gap:8px;
  font-size:10px;flex-shrink:0;background:rgba(0,0,0,.5)}
.mi{font-size:13px;flex-shrink:0;filter:drop-shadow(0 0 4px currentColor)}
.mn{font-weight:700;letter-spacing:1px;margin-bottom:1px}
.md{font-size:8px;opacity:.75;font-style:italic}

/* 主容器 */
#main{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--crack) var(--void)}
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-thumb{background:var(--crack2)}

/* ═══ 地图 ═══ */
.fbar{background:linear-gradient(180deg,var(--s2),var(--s1));border-bottom:1px solid var(--crack);
  padding:8px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,.6)}
.fl{font-family:var(--fs);font-size:16px;font-weight:700;color:var(--bone);letter-spacing:2px;
  text-shadow:0 0 12px rgba(200,169,110,.3),1px 1px 0 #000}
.fr{display:flex;align-items:center;gap:8px}
.psb{font-size:11px;padding:2px 8px;border:1px solid;letter-spacing:1px;font-style:italic;background:rgba(0,0,0,.4)}
.fp{font-size:11px;color:var(--text3);letter-spacing:1px}
#mwrap{background:radial-gradient(ellipse at 50% 40%,rgba(74,26,122,.1),transparent 65%),linear-gradient(180deg,var(--s1),var(--void));border-bottom:1px solid var(--crack);padding:6px 0}
.mprompt{padding:6px 14px 2px;font-size:11px;color:var(--text3);letter-spacing:3px;font-style:italic;text-align:center}
#mchooser{display:flex;flex-direction:column;gap:4px;padding:6px 8px 4px}
.mrow{display:flex;gap:4px;justify-content:center;transition:opacity .3s,transform .3s}
.mrow-d2{opacity:.42;transform:scale(.88);pointer-events:none}
.mrow-d1{opacity:.70;transform:scale(.95);pointer-events:none}
.mrow-act{position:relative}
.mplayer-row{display:flex;justify-content:center;gap:4px;padding:3px 0 1px}
.mplayer-cell{width:58px;text-align:center;font-size:9px;letter-spacing:1px}
.mcard{width:58px;height:82px;border-radius:5px;border:2px solid;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s,opacity .2s;flex-shrink:0;overflow:hidden;
  background:linear-gradient(160deg,#1a1428,#0d0a18);opacity:1;pointer-events:none}
.mrow-act .mcard:not(.reach){opacity:.2;filter:saturate(.25)}
.mcard.reach{opacity:1;cursor:pointer;pointer-events:auto}
.mcard.reach:hover{transform:translateY(-6px) scale(1.07);box-shadow:0 12px 22px rgba(0,0,0,.8),0 0 10px rgba(200,169,110,.2)}
.mcard.reach:active{transform:translateY(-1px) scale(.97)}
.mcard.path-dim{opacity:.30!important;filter:saturate(.2)!important}
.mcard-boss{animation:bpulse 2s ease-in-out infinite}
.mcard-blind{border-style:dashed!important;background:rgba(10,7,18,.97)!important}
.mcsuit{position:absolute;top:3px;left:5px;font-size:11px;font-weight:900;line-height:1}
.mclabel{position:absolute;top:3px;right:5px;font-size:8px;font-weight:700}
.mcicon{font-size:20px;margin-bottom:2px}
.mctype{font-size:7px;letter-spacing:1px;font-weight:700;text-align:center;padding:0 2px}
.mchint{font-size:6px;opacity:.7;margin-top:1px;letter-spacing:.5px;font-style:italic}
/* 篝火·铁匠铺 blessing card */
.bless-row{display:flex;gap:10px;justify-content:center;padding:8px 0 4px}
.bless-card{flex:1;max-width:120px;background:linear-gradient(160deg,var(--s3),var(--s4));
  border:1px solid var(--crack2);border-radius:5px;padding:12px 8px;text-align:center;
  cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s}
.bless-card:hover{border-color:var(--amber2);transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,.6),0 0 8px rgba(212,136,26,.2)}
.bless-card:active{transform:translateY(0);box-shadow:none}
.bless-art{font-size:22px;margin-bottom:5px}
.bless-name{font-family:var(--fs);font-size:12px;color:var(--bone);font-weight:700;margin-bottom:4px}
.bless-desc{font-size:9px;color:var(--text2);line-height:1.5;font-style:italic}
.mhist{padding:4px 14px 6px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;border-top:1px solid var(--crack);min-height:26px}
.mhistitem{font-size:15px;opacity:.35;cursor:default}
.tav-sec-title{font-size:10px;color:var(--text3);letter-spacing:3px;padding:10px 0 5px;text-align:center;border-top:1px solid var(--crack);margin-top:8px;font-style:italic}
.abuf{color:var(--slime);font-weight:700;font-size:9px;vertical-align:middle}
.hcrb{position:absolute;bottom:4px;right:4px;font-size:8px;padding:1px 3px;border:1px solid;background:rgba(0,0,0,.75);z-index:5;letter-spacing:0;line-height:1.4}
.hcrb.rc{color:var(--ash);border-color:var(--ash2)}
.hcrb.ru{color:var(--frost);border-color:var(--ice)}
.hcrb.rr{color:var(--amber);border-color:var(--amber2)}
.hcrb.rcu{color:var(--soul);border-color:var(--violet)}

/* ═══ 战斗 KOF格斗风格 ═══ */
#bv{display:none;grid-template-areas:"scene""hand""buttons""stats";grid-template-columns:1fr;grid-template-rows:1fr auto auto auto;height:calc(100dvh - 62px)}
.bscene{grid-area:scene;position:relative;overflow:hidden;display:flex;align-items:stretch;
  background:#07050e;min-height:140px}
.bscene::before{content:'';position:absolute;left:0;right:0;bottom:82px;height:2px;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(200,169,110,.22) 25%,rgba(200,169,110,.1) 50%,rgba(200,169,110,.22) 75%,transparent 100%);
  box-shadow:0 0 18px rgba(200,169,110,.08)}
.bscene::after{content:'';position:absolute;bottom:82px;left:6%;right:6%;height:12px;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 100%,rgba(0,0,0,.75) 0%,transparent 70%)}
.etag{position:absolute;top:5px;left:50%;transform:translateX(-50%);z-index:5;
  font-size:9px;color:rgba(200,169,110,.55);letter-spacing:2px;font-style:italic;
  background:rgba(0,0,0,.45);padding:2px 10px;white-space:nowrap;pointer-events:none}
.bchar-p{flex:0 0 43%;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;
  background:linear-gradient(180deg,rgba(58,90,138,.06) 0%,transparent 60%)}
.bchar-p::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:3;
  background:linear-gradient(90deg,var(--ice),var(--frost),var(--ice))}
.bchar-e{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;
  background:linear-gradient(180deg,rgba(139,26,26,.07) 0%,transparent 65%)}
.bchar-e::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:3;
  background:linear-gradient(90deg,var(--blood2),var(--gore),var(--blood2))}
.pav{flex:1;width:100%;min-height:50px;display:flex;align-items:flex-end;justify-content:center;font-size:58px;
  padding-bottom:4px;position:relative;overflow:hidden;filter:drop-shadow(0 4px 10px rgba(0,0,0,.8));
  animation:idle-bob 2.1s ease-in-out infinite}
.ep{flex:1;width:100%;min-height:60px;display:flex;align-items:flex-end;justify-content:center;font-size:78px;
  padding-bottom:2px;position:relative;overflow:hidden;filter:drop-shadow(0 4px 12px rgba(0,0,0,.9))}
.ep::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,transparent 0,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 3px);pointer-events:none}
.ep.fe{filter:drop-shadow(0 4px 12px rgba(0,0,0,.9)) drop-shadow(0 0 18px rgba(200,136,26,.5))}
.ep.fb{animation:bpulse 3s ease-in-out infinite;filter:drop-shadow(0 4px 12px rgba(0,0,0,.9)) drop-shadow(0 0 22px rgba(154,90,191,.6))}
@keyframes bpulse{0%,100%{filter:drop-shadow(0 4px 12px rgba(0,0,0,.9)) drop-shadow(0 0 14px rgba(106,58,154,.4))}50%{filter:drop-shadow(0 4px 12px rgba(0,0,0,.9)) drop-shadow(0 0 28px rgba(154,90,191,.8))}}
.binfo-p{width:100%;text-align:center;background:rgba(0,0,0,.84);border-top:1px solid rgba(122,170,191,.18);padding:6px 7px 7px;flex-shrink:0;z-index:3}
.binfo-e{width:100%;text-align:center;background:rgba(0,0,0,.84);border-top:1px solid rgba(139,26,26,.28);padding:6px 7px 7px;flex-shrink:0;z-index:3}
.en{font-family:var(--fs);font-size:14px;font-weight:900;letter-spacing:1px;margin-bottom:2px;color:var(--text);text-shadow:1px 1px 0 #000}
.en.eli{color:var(--amber);text-shadow:0 0 14px rgba(212,136,26,.4),1px 1px 0 #000}
.en.bos{color:var(--violet);text-shadow:0 0 18px rgba(154,90,191,.5),1px 1px 0 #000;animation:nflicker 5s ease-in-out infinite}
@keyframes nflicker{0%,94%,100%{opacity:1}97%{opacity:.8}}
.hlt{font-size:11px;color:var(--text);letter-spacing:1px;margin-bottom:2px;font-style:italic}
.hbg{height:7px;background:var(--void);border:1px solid var(--crack);overflow:hidden;
  max-width:110px;margin:2px auto 4px;
  box-shadow:inset 0 1px 4px rgba(0,0,0,.8);position:relative}
.hbg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 9px,rgba(0,0,0,.25) 9px,rgba(0,0,0,.25) 10px);z-index:2;pointer-events:none}
.hf{height:100%;transition:width .4s cubic-bezier(.4,0,.2,1);position:relative}
.hf::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.15)}
.hf.ef{background:linear-gradient(90deg,var(--blood2),var(--blood),var(--gore));box-shadow:0 0 8px rgba(139,26,26,.6)}
.hf.pf{background:linear-gradient(90deg,var(--mold),#3a8a2a,var(--slime));box-shadow:0 0 6px rgba(45,90,39,.5)}
.hf.lw{background:linear-gradient(90deg,var(--ash3),var(--amber2),var(--amber))}
.hf.cr{background:linear-gradient(90deg,#4a0000,var(--blood),var(--gore2));animation:bpuls2 .6s ease-in-out infinite}
@keyframes bpuls2{0%,100%{box-shadow:0 0 8px rgba(192,57,43,.6)}50%{box-shadow:0 0 22px rgba(224,80,64,.9)}}
.etk{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:0;justify-content:center}
.ibox{display:inline-flex;align-items:center;gap:4px;background:var(--blood3);border:1px solid var(--blood2);
  padding:3px 6px;font-size:10px;color:var(--gore2);letter-spacing:1px;font-style:italic;
  box-shadow:0 0 8px rgba(139,26,26,.3)}
.sr{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;justify-content:center}
.sb{font-size:9px;padding:1px 5px;border:1px solid;letter-spacing:1px;font-style:italic;background:rgba(0,0,0,.4)}
.ss{color:var(--gore2);border-color:var(--blood2)}.sbk{color:var(--frost);border-color:var(--ice)}
.sp{color:var(--slime);border-color:var(--mold)}.sw{color:var(--violet);border-color:var(--soul)}
.sv{color:var(--amber);border-color:var(--amber2)}
.pn{font-size:11px;color:var(--bone);letter-spacing:2px;margin-bottom:2px;font-style:italic;text-shadow:0 0 14px currentColor;transition:color .5s}
.pap{display:flex;align-items:center;gap:4px;justify-content:center;margin-top:3px}
.papt{font-size:9px;color:var(--text3);letter-spacing:2px;font-style:italic;padding:0 3px}
.pst{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px;justify-content:center}
.pht{font-size:13px;letter-spacing:1px;color:var(--gore2);font-style:italic;font-weight:700}
.bb{display:inline-flex;align-items:center;gap:3px;background:rgba(58,90,138,.25);border:1px solid var(--ice);
  padding:2px 6px;font-size:11px;color:var(--frost);box-shadow:0 0 8px rgba(58,90,138,.3);font-weight:700}
.hz{grid-area:hand;padding:10px 0 6px;background:linear-gradient(180deg,#090711,var(--s1));border-bottom:1px solid var(--crack);overflow:visible;display:flex;flex-direction:column}
.hh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:0 14px}
.hlb{font-size:12px;color:var(--text2);letter-spacing:3px;font-style:italic}
.hlb::before{content:'✦ ';color:var(--blood2);font-size:7px}
.apb{display:flex;align-items:center;gap:4px;background:rgba(58,90,138,.2);border:1px solid var(--ice);
  padding:4px 10px;font-size:13px;color:var(--frost);box-shadow:0 0 8px rgba(58,90,138,.25);font-weight:700}
.app{width:9px;height:9px;border:1px solid var(--ice);display:inline-block;background:var(--void)}
.app.on{background:var(--frost);box-shadow:0 0 4px var(--frost)}
.hcs{display:flex;overflow-x:auto;overflow-y:visible;padding:8px 18px 20px;flex:1;align-items:flex-end;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hcs::-webkit-scrollbar{display:none}

/* 手牌 */
.hc{flex-shrink:0;width:105px;height:180px;background:linear-gradient(160deg,#1e1820,#171220);
  border:1px solid var(--crack2);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02),2px 2px 0 var(--void);
  cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;
  margin-right:-30px;z-index:1}
.hc:last-child{margin-right:0}
.hc::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent 0,transparent 6px,rgba(255,255,255,.006) 6px,rgba(255,255,255,.006) 7px);
  pointer-events:none;z-index:1}
.hc:active{transform:translateY(-8px) scale(1.06);box-shadow:2px 10px 0 var(--void)}
.hc.unp{opacity:.28;pointer-events:none}
.hc.atk{border-top:2px solid var(--blood)}.hc.def{border-top:2px solid var(--mold)}
.hc.skl{border-top:2px solid var(--ice)}.hc.pwr{border-top:2px solid var(--soul)}
.hc.crs{border-top:2px solid var(--ash3);filter:saturate(.5)}
.hcc{position:absolute;top:4px;left:4px;width:23px;height:23px;
  background:radial-gradient(circle at 40% 35%,var(--frost) 0%,var(--ice) 50%,var(--void) 100%);
  border:1px solid var(--frost);display:flex;align-items:center;justify-content:center;
  font-family:var(--fs);font-size:14px;font-weight:900;color:#fff;
  box-shadow:0 0 7px rgba(106,154,191,.4),1px 1px 0 var(--void);z-index:3}
.hcc.c0{background:radial-gradient(circle at 40% 35%,var(--ash2),var(--ash3));border-color:var(--ash2);color:var(--ash);box-shadow:none}
.hcc.c2{background:radial-gradient(circle at 40% 35%,var(--amber),var(--amber2),var(--void));border-color:var(--amber);color:var(--bone);box-shadow:0 0 7px rgba(212,136,26,.4)}
.hcc.c3{background:radial-gradient(circle at 40% 35%,var(--gore),var(--blood),var(--void));border-color:var(--gore);color:var(--text);box-shadow:0 0 7px rgba(192,57,43,.5)}
.hca{height:72px;background:linear-gradient(160deg,var(--s3),var(--s4));
  display:flex;align-items:center;justify-content:center;font-size:30px;
  border-bottom:1px solid var(--crack);position:relative;overflow:hidden;z-index:2}
.hca::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,transparent 0,transparent 2px,rgba(0,0,0,.14) 2px,rgba(0,0,0,.14) 3px)}
.hcb{padding:5px 5px 5px;position:relative;z-index:2}
.hcn{font-family:var(--fs);font-size:12px;font-weight:700;color:var(--bone);margin-bottom:2px;line-height:1.3;text-shadow:0 0 8px rgba(0,0,0,.8)}
.hct{font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:2px;font-style:italic}
.hcd{font-size:11px;color:var(--text2);line-height:1.4}
.hcd b{color:var(--bone);font-weight:700}
.hcr{height:1px;margin-top:4px;opacity:.8}
.hcv{position:absolute;bottom:3px;right:4px;font-size:8px;color:var(--amber);opacity:.7;font-style:italic;z-index:5}
.hcup{position:absolute;top:3px;right:4px;font-size:9px;color:var(--slime);font-weight:700;z-index:5}

/* ── KOF 格斗风格动画 ── */
/* 角色空闲晃动 */
@keyframes idle-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes idle-flip{0%,100%{transform:scaleX(-1) translateY(0)}50%{transform:scaleX(-1) translateY(-7px)}}
/* 敌人内层span：镜像朝向玩家 */
.ep-inner{display:block;transform:scaleX(-1);animation:idle-flip 1.85s ease-in-out infinite}
/* 玩家出牌动作 */
@keyframes atk-lunge{
  0%{transform:translateY(0) translateX(0)}
  18%{transform:translateY(-10px) translateX(2px)}
  48%{transform:translateY(-4px) translateX(30px) scale(1.1)}
  78%{transform:translateY(0) translateX(8px)}
  100%{transform:translateY(0) translateX(0)}}
@keyframes def-raise{
  0%,100%{transform:scale(1) rotate(0) translateY(0)}
  40%{transform:scale(1.1) rotate(-10deg) translateY(-10px)}}
@keyframes skl-cast{
  0%,100%{transform:scale(1) translateY(0)}
  30%{transform:scale(1.14) translateY(-14px)}
  65%{transform:scale(1.05) translateY(-5px)}}
@keyframes p-hit{
  0%,100%{transform:translateX(0)}
  30%{transform:translateX(-16px)}
  70%{transform:translateX(-4px)}}
/* 敌人动作（含scaleX(-1)基础变换） */
@keyframes e-hit{
  0%,100%{transform:scaleX(-1) translateX(0)}
  25%{transform:scaleX(-1) translateX(20px)}

function gc(id){const c=DB.find(c=>c.id===id);return c?JSON.parse(JSON.stringify(c)):null;}
function cardValue(c){
  if(!c||c.rar==='curse')return 0;
  if(c.special){
    // Special cards: fixed base scores because their power isn't captured by numeric stat fields
    const sv={soul_strike:60,chaos_shot:40,last_stand:42,martyr:53,catalyze:29,
               phantom_hit:40,heartbreak:27,desperation:37,bloodrush:40,execute:43};
    const rm=c.rar==='rare'?1.5:c.rar==='uncommon'?1.2:1;
    return Math.round((sv[c.special]||40)*rm*(1+(c.upgradeCount||0)*.2));
  }
  const base=(c.atk||0)*2+(c.atk&&c.times?(c.atk*(c.times-1)*1.5):0)+
    (c.blk||0)*1.5+(c.heal||0)*1.5+(c.str||0)*8+(c.draw||0)*7+
    (c.ap||0)*12+(c.poison||0)*5+(c.weak||0)*6+(c.vuln||0)*6;
  const cm=[1.4,1,0.8,0.65][Math.min(c.cost||0,3)];
  const rm=c.rar==='rare'?1.5:c.rar==='uncommon'?1.2:1;
  return Math.max(5,Math.round(base*cm*rm*(1+(c.upgradeCount||0)*.18)));
}
function upgradeCard(c){
  if(!c||c.rar==='curse')return;
  if(c.special){
    switch(c.special){
      case 'soul_strike':  c.soulPct=(c.soulPct||.25)+.05; c.desc=`造成敌人当前HP的 <b>${Math.round(c.soulPct*100)}%</b> 伤害（无视格挡）`; break;
      case 'chaos_shot':   c.chaosMin=(c.chaosMin||8)+4;c.chaosMax=(c.chaosMax||45)+15; c.desc=`造成 <b>${c.chaosMin}~${c.chaosMax}</b> 随机伤害`; break;
      case 'last_stand':   c.lsDmgHigh=(c.lsDmgHigh||55)+20;c.lsDmgLow=(c.lsDmgLow||15)+7; c.desc=`HP≤30%时造成 <b>${c.lsDmgHigh}</b> 伤，否则 <b>${c.lsDmgLow}</b> 伤`; break;
      case 'martyr':       c.exhaust=false; c.desc='消耗当前HP仅剩1，造成等量无视格挡伤害'; break;
      case 'catalyze':     c.catalyzeCount=(c.catalyzeCount||1)+1; c.desc=`下 <b>${c.catalyzeCount}</b> 张牌费用归零（消耗）`; break;
      case 'phantom_hit':  c.cost=Math.max(0,c.cost-1); c.desc='造成等于当前格挡量的伤害（无视敌人格挡）'; break;
      case 'heartbreak':   c.hbDmg=(c.hbDmg||14)+8; c.desc=`清除敌人所有格挡，造成 <b>${c.hbDmg}</b> 伤害`; break;
      case 'desperation':  c.despDiv=Math.max(5,(c.despDiv||15)-5); c.desc=`获得 力量 = 缺失HP÷${c.despDiv}（最少1）（消耗）`; break;
      case 'bloodrush':    c.cost=Math.max(0,c.cost-1); c.desc='造成等于 <b>缺失HP</b> 的伤害'; break;
      case 'execute':      c.execThresh=(c.execThresh||.30)+.10;c.execDmg=(c.execDmg||18)+10; c.desc=`敌人HP＜${Math.round((c.execThresh)*100)}%时即死，否则造成 <b>${c.execDmg}</b> 伤`; break;
    }
    c.upgraded=true;c.upgradeCount=(c.upgradeCount||0)+1;
    return;
  }
  const pct=c.rar==='rare'?0.28:c.rar==='uncommon'?0.22:0.18;
  if(c.kind==='atk'&&c.atk){c.atk=Math.max(c.atk+2,Math.round(c.atk*(1+pct)));}
  else if(c.kind==='def'&&c.blk){c.blk=Math.max(c.blk+2,Math.round(c.blk*(1+pct)));}
  else if(c.kind==='skl'){
    if(c.cost>0){c.cost=Math.max(0,c.cost-1);}
    else if(c.draw){c.draw++;}
    else if(c.heal){c.heal=Math.max(c.heal+2,Math.round(c.heal*(1+pct)));}
    else if(c.poison){c.poison=Math.round(c.poison*(1+pct))+1;}
    else if(c.str){c.str++;}
  }
  c.upgraded=true;
  c.upgradeCount=(c.upgradeCount||0)+1;
}
function buildStarterDeck(){
  const pick=(pool,n)=>Array(n).fill(0).map(()=>gc(pool[0|Math.random()*pool.length]));
  const atkPicks=pick(['strike','slam','double','multishot'],3);
  const defPicks=pick(['defend','fortify','barrier','guard_quick'],3);
  const sklPicks=pick(['inspect','discard','poison_flask','weaken','meditate'],2);
  window._starterRandom={atk:atkPicks,def:defPicks,skl:sklPicks};
  const base=[...atkPicks,...defPicks,...sklPicks,gc('strength'),gc('focus_stone')];
  const legacyIds=loadLegacy();
  legacyIds.forEach(id=>{const c=gc(id);if(c){c.isLegacy=true;base.push(c);}});
  return base;
}

function _cdActs(cardDmg,atk){
  const v={磨损:[{t:'wear_card',v:1,n:'磨损'}],折痕:[{t:'wear_card',v:2,n:'折痕撕裂'}],撕裂:[{t:'steal',v:1,n:'撕裂夺牌'}],破碎:[{t:'exile_card',v:1,n:'破碎封印'}],焚毁:[{t:'burn_card',v:1,n:'焚毁腐化'}]};
  return(v[cardDmg]||[]).map(a=>a.t==='a'?{...a,v:atk}:{...a});
}
function _cpPick(stepBand){
  const w={0:[[30,'孱弱'],[45,'健康'],[20,'强壮'],[5,'暴虐'],[0,'恐怖']],1:[[10,'孱弱'],[30,'健康'],[35,'强壮'],[20,'暴虐'],[5,'恐怖']],2:[[2,'孱弱'],[12,'健康'],[30,'强壮'],[35,'暴虐'],[21,'恐怖']]}[stepBand]||[];
  let r=Math.random()*100;for(const[p,n]of w){r-=p;if(r<=0)return n;}return'健康';
}
function _cdPick(stepBand){
  const w={0:[[45,'磨损'],[35,'折痕'],[15,'撕裂'],[4,'破碎'],[1,'焚毁']],1:[[20,'磨损'],[30,'折痕'],[30,'撕裂'],[15,'破碎'],[5,'焚毁']],2:[[5,'磨损'],[15,'折痕'],[30,'撕裂'],[30,'破碎'],[20,'焚毁']]}[stepBand]||[];
  let r=Math.random()*100;for(const[p,n]of w){r-=p;if(r<=0)return n;}return'磨损';
}
function buildEnemyFromDims(card,isElite,ps){
  const {combatPower='健康',cardDmg='磨损',trait='流浪者'}=card;
  const td=TRAIT_DEFS[trait]||TRAIT_DEFS['流浪者'];
  const cs=CP_SCALE[combatPower]||CP_SCALE['健康'];
  const fp=chapter.floor||1;const rank=window._mapRank||7;
  const rankMult=rank<=4?.85:rank<=8?1.0:rank<=12?1.15:1.30;
  const tierScale=(1+(fp-1)*.1)*rankMult;const em=window._mapEffectMult||1;
  const hp=Math.round(player.maxHp*(isElite?0.9:0.5)*cs.h*tierScale*(em>1&&!isElite?em:1));
  const atk=Math.round(player.maxHp*(isElite?.14:.11)*cs.a*tierScale);
  const atkCap=player.maxHp*(isElite?.28:.22);
  const finalAtk=Math.round(Math.min(Math.max(3,atk),atkCap));
  const baseActs=td.acts(finalAtk);
  const cdExtra=_cdActs(cardDmg,finalAtk);
  const actions=shuf([...baseActs,...cdExtra]);
  const nm=td.names[0|Math.random()*td.names.length];
  const gMin=Math.round((8+fp*5)*(isElite?2:1));
  return{name:nm,art:td.art,tier:isElite?'elite':'fight',aiType:td.aiType,
    combatPower,cardDmg,trait,traitDesc:td.desc,
    hp,atk:finalAtk,actions,block:0,str:0,poison:0,
    goldMin:gMin,goldMax:Math.round(gMin*1.6),
    escapeRound:td.escapeRound,returnOnKill:td.returnOnKill,destroyStolen:td.destroyStolen,lifesteal:td.lifesteal,
    loot:{cards:['strike','defend','inspect']}};
}

    try{

        v:this.V,ts:Date.now(),

  },
  load(slot){
    const s=slot!==undefined?slot:this._slot;
    try{
      const sv=JSON.parse(localStorage.getItem(this.K(s)));
      if(!sv||sv.v!==this.V)return false;
      this._slot=s;
      player={...sv.player};
      chapter={...sv.chapter,usedEnemies:new Set(sv.chapter.usedEnemies||[])};

  clear(slot){
    const s=slot!==undefined?slot:this._slot;
    try{localStorage.removeItem(this.K(s));}catch(e){}

      try{

        if(sv.v!==this.V)return{slot:s,empty:true};
        return{slot:s,empty:false,...sv};
      }catch(e){return{slot:s,empty:true};}

};

function calcPS(){
  const ds=battle.deck.reduce((s,c)=>{const w={common:1,uncommon:2,rare:4,curse:-1};return s+(w[c.rar]||1)+(cardValue(c)||0)*.05;},0);
  return Math.round(ds+(player.maxHp/80)*20+chapter.floor*8+player.kills*2+Math.floor(player.gold/20));
}
function buildEnemy(tmpl,isElite,isBoss){
  const fp=chapter.floor;
  const rank=window._mapRank||7;
  const rankMult=rank<=4?.85:rank<=8?1.0:rank<=12?1.15:1.30;
  const tierScale=(1+(fp-1)*.1)*rankMult;
  const effectMult=window._mapEffectMult||1;
  // HP: tier base × normalized hpMult (each tier's avg hpMult treated as 1.0)
  const hpBase=player.maxHp*(isBoss?1.4:isElite?0.9:0.5);
  const hpNorm=isBoss?3.0:isElite?1.6:1.0;
  const hp=Math.round(hpBase*(tmpl.hpMult/hpNorm)*tierScale*(isBoss&&window._bossDoubled?2:effectMult>1&&!isBoss?effectMult:1));
  // Target attack per turn: % of player maxHP (keeps fights fair)
  const dangerPct=isBoss?.19:isElite?.14:.11;
  const targetAtkPerTurn=Math.round(player.maxHp*dangerPct*tierScale);
  // Scale action values so average damage output ≈ targetAtkPerTurn
  const tmplActions=tmpl.actions||[];
  const tmplAtkActions=tmplActions.filter(a=>a.t==='a');
  const avgTmplAtk=tmplAtkActions.length>0?tmplAtkActions.reduce((s,a)=>s+a.v,0)/tmplAtkActions.length:8;
  const attackFreq=tmplAtkActions.length/Math.max(tmplActions.length,1);
  const atkScale=targetAtkPerTurn/Math.max(avgTmplAtk*attackFreq,3);
  const atkCap=player.maxHp*(isBoss?.34:isElite?.26:.20);
  const actions=tmplActions.map(a=>({...a,
    v:a.t==='a'?Math.round(Math.min(Math.max(3,a.v*atkScale),atkCap)):
      a.t==='d'?Math.round(Math.max(2,a.v*atkScale*.4)):a.v}));
  const gMin=Math.round((8+fp*5)*(isBoss?3:isElite?2:1));
  const e={...tmpl,hp,atk:targetAtkPerTurn,actions,block:0,str:0,poison:tmpl.poison||0,goldMin:gMin,goldMax:Math.round(gMin*1.5)};
  if(chapter.modifier?.apply)chapter.modifier.apply(e,calcPS());
  return e;
}
function generateChapter(){
  const theme=THEMES[0|Math.random()*THEMES.length];
  const mod=MODS[0|Math.random()*MODS.length];
  const bossTmpls=shuf(ET.filter(e=>e.tier==='boss'));
  const boss=bossTmpls[0];

  chapter.theme=theme;chapter.modifier=mod;chapter.boss=boss;chapter.boss2=boss2;
  chapter.usedEnemies=new Set();
  return{theme,mod,boss,boss2,ps:calcPS(),floor:chapter.floor};
}

      {type:'boss',bossVariant:'hard',isHidden:true,revealed:false,...blindVariants[1],

function playSelectedCards(){

  if(battle.playerStun>0){toast('🌀 你被眩晕，本回合无法出牌！','r');return;}
  // 缴械：无法使用攻击牌
  if(battle.playerDisarm>0&&c.kind==='atk'){toast('⛓ 你被缴械，无法使用攻击牌！','r');return;}
  const cardCost=battle.nextFreeCount>0?0:c.cost;if(battle.nextFreeCount>0)battle.nextFreeCount--;

  showCardFly(c);
  triggerPAnim(c.kind==='atk'?'a-atk':c.kind==='def'?'a-def':'a-skl');
  battle.hand.splice(idx,1);
  if(c.exhaust)battle.exhPile.push(c);else battle.discardPile.push(c);
  battle.selectedCards=[];
  const prevEHp=battle.enemyHp;
  applySingleCard(c,1);
  if(battle.enemyHp<=0){endBattle(true);return;}
  renderBattle();
  if(c.kind==='atk'&&battle.enemyHp<prevEHp){setTimeout(()=>triggerEAnim('a-hit'),180);}

function _enemyPickAction(){
  const acts=battle.enemyActions||[];if(!acts.length)return null;
  const ai=battle.enemy?.aiType||'power';
  const w=acts.map(a=>{
    if(ai==='power')return a.t==='a'?(a.v||8)*1.3:a.t==='d'?0.8:1.0;
    else return(a.t==='p'||a.t==='z'||a.t==='x'||a.t==='w')?2.5:(a.t==='h'||a.t==='s')?1.6:0.8;
  });
  const tot=w.reduce((s,x)=>s+x,0);let r=Math.random()*tot;
  for(let i=0;i<acts.length;i++){r-=w[i];if(r<=0)return acts[i];}
  return acts[acts.length-1];
}

function showReward(gold){
  phase=PH.OV;
  const ps=calcPS();
  const enemy=battle.enemy||{tier:'fight',loot:{cards:[],relics:[]},art:'✦',name:'奖励'};
  const tier=enemy.tier;
  const loot=enemy.loot||{cards:[],relics:[]};
  const isElite=tier==='elite',isBoss=tier==='boss';
  // Card pool: enemy loot first, fill random
  const rc=Math.min(.5,ps/130);const uc=Math.min(.65,.25+ps/110);
  const fillPool=DB.filter(c=>c.rar!=='curse');
  function randCard(ex){const av=fillPool.filter(c=>!ex.has(c.id));const w=av.map(c=>c.rar==='rare'?rc*3:c.rar==='uncommon'?uc*2:1);const tot=w.reduce((s,x)=>s+x,0);let r=Math.random()*tot;for(let i=0;i<av.length;i++){r-=w[i];if(r<=0)return av[i];}return av[av.length-1];}
  const forceRare=window._eventRareCount||0;window._eventRareCount=0;
  let picked=[];const used=new Set();
  if(forceRare>0){
    const rarePool=DB.filter(c=>c.rar==='rare');
    shuf(rarePool).slice(0,forceRare).forEach(c=>{picked.push(c);used.add(c.id);});
    while(picked.length<3){const c=randCard(used);if(!c)break;picked.push(c);used.add(c.id);}
  }else{
    // Enemy's own cards + one generated card
    shuf([...loot.cards]).forEach(id=>{if(!used.has(id)){const c=DB.find(x=>x.id===id);if(c){picked.push(c);used.add(id);}}});
    const genCard=CardGen.one(ps);
    if(picked.length<3)picked.push(genCard);
    else picked[picked.length-1]=genCard;
    while(picked.length<3){const c=randCard(used);if(!c)break;picked.push(c);used.add(c.id);}
  }
  window._rw=picked;window._rwSel=null;window._rwGold=gold;window._rwLabel=isBoss?`☠ 击败 ${enemy.name}`:isElite?`✦ 掠夺 ${enemy.name}`:forceRare?'✦ 事件奖励':'⚔ 战斗奖励';window._rwBoss=isBoss;window._rwElite=isElite;window._rwForce=forceRare;window._rwEnemy=enemy.name;
  showView('ov');renderHud();renderTokens();
  renderRewardUI();
}

function genTavernCards(){
  const disc=(chapter.modifier?.shopDiscount||1)/(window._mapEffectMult||1);
  const ps=calcPS();
  // Weighted random card pool: higher ps = more rare/uncommon
  const rc=Math.min(.45,ps/150);const uc=Math.min(.6,.2+ps/120);
  const pool=DB.filter(c=>c.rar!=='curse');
  const used=new Set(battle.deck.map(c=>c.id));
  function weightedPick(){const av=pool.filter(c=>!used.has(c.id));if(!av.length)return null;const w=av.map(c=>c.rar==='rare'?rc*4:c.rar==='uncommon'?uc*2.5:1);const tot=w.reduce((s,x)=>s+x,0);let r=Math.random()*tot;for(let i=0;i<av.length;i++){r-=w[i];if(r<=0){used.add(av[i].id);return av[i];}}const c=av[av.length-1];used.add(c.id);return c;}
  const priceOf=c=>c.rar==='rare'?Math.round(105*disc):c.rar==='uncommon'?Math.round(65*disc):Math.round(38*disc);
  const cards=[];for(let i=0;i<4;i++){const c=weightedPick();if(c)cards.push({card:c,price:priceOf(c)});}
  return cards;
}

function renderHand(){
  const b=battle;
  const selectedSet=new Set(b.selectedCards||[]);
  document.getElementById('hcs').innerHTML=b.hand.map((c,i)=>{
    const sel=selectedSet.has(i);
    const unplay=b.apLeft<c.cost||c.unplayable;
    const cc=c.cost===0?'c0':c.cost===2?'c2':c.cost>=3?'c3':'';
    const kc=c.kind==='atk'?'atk':c.kind==='def'?'def':c.kind==='skl'?'skl':'crs';
    let actualAtk=null;
    if(c.kind==='atk'&&c.atk){
      let a=c.apscale?c.atk*(b.apLeft+c.cost):(c.atk+(b.str||0));
      if(b.playerWeak>0)a=Math.floor(a*.75);
      if(a!==c.atk)actualAtk=Math.max(0,a);
    }
    let d=(c.desc||'');
    if(actualAtk!==null)d=d.replace('{atk}',`${c.atk}<span class="abuf">→${actualAtk}</span>`);
    else d=d.replace('{atk}',c.atk||0);
    d=d.replace('{blk}',c.blk||0).replace('{heal}',c.heal||0).replace('{str}',c.str||0);
    const kn=c.kind==='atk'?'攻击':c.kind==='def'?'防御':c.kind==='skl'?'技能':'诅咒';
    const rc2=c.rar==='common'?'rc':c.rar==='uncommon'?'ru':c.rar==='rare'?'rr':'rcu';
    const rarBadge=c.rar==='rare'?`<div class="hcrb rr">◆</div>`:c.rar==='uncommon'?`<div class="hcrb ru">◇</div>`:c.rar==='curse'?`<div class="hcrb rcu">☠</div>`:`<div class="hcrb rc">○</div>`;
    const val=cardValue(c);const valBadge=val>0?`<div class="hcv">${val}g</div>`:'';
    const upgBadge=c.upgradeCount?`<div class="hcup">+${c.upgradeCount}</div>`:'';
    return`<div class="hc ${kc}${sel?' sel':''}${unplay?' unp':''}" onclick="selectCard(${i})"><div class="hcc ${cc}">${c.cost}</div><div class="hca">${c.art}</div><div class="hcb"><div class="hcn">${c.name}${upgBadge}</div><div class="hct">${kn}${c.dur?'·全场':''}</div><div class="hcd">${d}</div><div class="hcr ${rc2}"></div></div>${rarBadge}${valBadge}</div>`;
  }).join('');
  updatePlayButton();
}

}

  el.classList.remove('a-atk','a-def','a-skl','a-hit');void el.offsetWidth;
  el.classList.add(cls);
  el.addEventListener('animationend',()=>el.classList.remove(cls),{once:true});
}
function triggerEAnim(cls){
  const el=document.querySelector('#ep .ep-inner');if(!el)return;
  el.classList.remove('a-hit','a-atk');void el.offsetWidth;
  el.classList.add(cls);
  el.addEventListener('animationend',()=>el.classList.remove(cls),{once:true});
}
function showCardFly(c){
  try{
    const pav=document.getElementById('pav');const ep=document.getElementById('ep');
    if(!pav||!ep)return;
    const pR=pav.getBoundingClientRect();const eR=ep.getBoundingClientRect();
    const fly=document.createElement('span');
    fly.style.cssText='position:fixed;z-index:9999;pointer-events:none;font-size:26px;line-height:1;'
      +'left:'+(pR.left+pR.width*.45-13)+'px;top:'+(pR.top+pR.height*.45-13)+'px';
    fly.textContent=c.kind==='atk'?(c.art||'🗡'):c.kind==='def'?'🛡':'✨';
    document.body.appendChild(fly);
    const dx=(eR.left+eR.width*.5)-(pR.left+pR.width*.45);
    const dy=(eR.top+eR.height*.4)-(pR.top+pR.height*.45);
    fly.animate(
      c.kind==='def'
        ?[{transform:'scale(1)',opacity:1},{transform:'scale(2.2) translateY(-28px)',opacity:0}]
        :[{transform:'rotate(-8deg) scale(1.3)',opacity:1},
          {transform:'translate('+dx+'px,'+dy+'px) rotate(22deg) scale(0.25)',opacity:0}],
      {duration:c.kind==='def'?300:400,easing:c.kind==='def'?'ease-out':'ease-in'}
    ).onfinish=()=>fly.remove();
  }catch(e){}
}

    </div>`;
  }).join('');

function playGamble(tier){
  const costs={c:20,u:55,r:90,x:40};const cost=costs[tier];
  if(player.gold<cost){toast('金币不足','r');return;}
  player.gold-=cost;renderHud();
  if(tier==='x'){
    if(Math.random()<.5){
      const cards=shuf(DB.filter(c=>c.rar!=='curse')).slice(0,2);
      cards.forEach(c=>battle.deck.push(JSON.parse(JSON.stringify(c))));
      toast(`赢了！获得 ${cards.map(c=>c.name).join(' + ')}`,'g');
    }else{player.gold=Math.max(0,player.gold-cost);toast(`输了！再失去 ${cost} 金币`,'r');renderHud();}
    setTimeout(startGamble,700);return;
  }
  const rarMap={c:'common',u:'uncommon',r:'rare'};const rar=rarMap[tier];
  const pool=DB.filter(c=>c.rar===rar);
  const used=new Set(battle.deck.map(c=>c.id));
  const avail=shuf(pool.filter(c=>!used.has(c.id)));
  const picks=(avail.length>=3?avail:shuf(pool)).slice(0,3);
  window._gamblePicks=picks;window._gambleSel=null;window._gambleTier=tier;window._gambleCost2=cost;
  document.getElementById('ovtag').textContent='🎲  赌馆结算';
  document.getElementById('ovtit').textContent={c:'小赌',u:'豪赌',r:'神赌'}[tier];
  renderGambleResult();
}
function renderGambleResult(){
  const picks=window._gamblePicks||[];const sel=window._gambleSel;const cost=window._gambleCost2||0;
  let h=`<div class="ovd">已花费 <b>${cost}</b> 金币。选1张：</div>`;
  h+=`<div class="tcards-table">${picks.map((c,j)=>renderPokerCard(c,`selectGamble(${j})`,{idx:j,total:picks.length,sel:sel===j})).join('')}</div>`;
  if(sel!==null&&sel!==undefined&&picks[sel]){
    const c=picks[sel];
    h+=`<div style="display:flex;gap:8px;margin-bottom:6px">
      <button class="ovbtn gd" style="flex:1;margin:0" onclick="confirmGamble()">✓ 获取 ${c.name}</button>
      <button class="ovbtn" style="flex:1;margin:0" onclick="window._gambleSel=null;renderGambleResult()">✗ 重选</button>
    </div>`;
  }
  h+=`<button class="ovbtn" onclick="startGamble()">再来一局</button>`;
  h+=`<button class="ovbtn" onclick="backToMap()">离开</button>`;
  document.getElementById('ovb').innerHTML=h;renderHud();renderTokens();
}
function selectGamble(i){window._gambleSel=i;renderGambleResult();}
function confirmGamble(){
  const i=window._gambleSel;const c=window._gamblePicks?.[i];

function burnOnAltar(){
  const validCards=battle.deck.filter(c=>c.rar!=='curse');
  const sel=window._altarSel;
  const c=validCards[sel];if(!c)return;
  const val=cardValue(c);const nm=c.name;
  const deckIdx=battle.deck.indexOf(c);
  if(deckIdx>=0)battle.deck.splice(deckIdx,1);
  window._altarSel=null;
  if(val>=60){
    const rewardHp=Math.floor(val*.35);
    const rarePool=shuf(DB.filter(x=>x.rar==='rare'));
    const ucPool=shuf(DB.filter(x=>x.rar==='uncommon'));
    let cards=`<div class="ccard" style="transform:rotate(-7deg) translateY(10px)" onclick="altarReward('hp',${rewardHp})">
      <div class="ccard-top" style="background:linear-gradient(90deg,transparent,rgba(45,140,45,.5),transparent)"></div>
      <div class="ccard-icon">❤</div><div class="ccard-text">生命之礼</div>
      <div class="ccard-sub">恢复 ${rewardHp} HP</div></div>`;
    if(rarePool[0]){const rc=rarePool[0];const rd=(rc.desc||'').replace('{atk}',rc.atk||0).replace('{blk}',rc.blk||0).replace('{heal}',rc.heal||0).replace('{str}',rc.str||0);
      cards+=`<div class="ccard" style="transform:rotate(0deg)" onclick="altarReward('card','${rc.id}')">
        <div class="ccard-top" style="background:linear-gradient(90deg,transparent,rgba(212,136,26,.5),transparent)"></div>
        <div class="ccard-icon">${rc.art}</div><div class="ccard-text">${rc.name}</div>
        <div class="ccard-sub">${rd.substring(0,40)}</div></div>`;}
    if(ucPool[0]){const uc=ucPool[0];const ud=(uc.desc||'').replace('{atk}',uc.atk||0).replace('{blk}',uc.blk||0).replace('{heal}',uc.heal||0).replace('{str}',uc.str||0);
      cards+=`<div class="ccard" style="transform:rotate(7deg) translateY(10px)" onclick="altarReward('card','${uc.id}')">
        <div class="ccard-top"></div>
        <div class="ccard-icon">${uc.art}</div><div class="ccard-text">${uc.name}</div>
        <div class="ccard-sub">${ud.substring(0,40)}</div></div>`;}
    document.getElementById('ovtag').textContent='🔱  祭坛馈赠';
    document.getElementById('ovtit').textContent='火焰的选择';
    document.getElementById('ovb').innerHTML=`<div class="ovd">🔥 <b>${nm}</b> 化为灰烬，祭坛颤动……三个馈赠向你低语：</div><div class="tcards-table">${cards}</div>`;
    renderHud();renderTokens();return;
  }
  if(val>=30){
    if(Math.random()<.6){const hp=Math.floor(val*.2);player.hp=Math.min(player.maxHp,player.hp+hp);toast(`🔥 ${nm}化为灰烬 +${hp}HP`,'g');}
    else{const pool=DB.filter(c=>c.rar==='common');const nc=pool[0|Math.random()*pool.length];if(nc){battle.deck.push(gc(nc.id));toast(`🔥 ${nm}化为灰烬，获得${nc.name}`,'g');}}
    setTimeout(backToMap,700);return;
  }
  if(Math.random()<.55){const d=Math.floor(player.maxHp*.08);player.hp=Math.max(1,player.hp-d);toast(`🔥 ${nm}化为灰烬，祭坛不悦！-${d}HP`,'r');}
  else{battle.deck.push(gc('regret'));toast(`🔥 ${nm}化为灰烬，祭坛降下诅咒！`,'r');}
  setTimeout(backToMap,700);
}
function altarReward(type,val){
  if(type==='hp'){player.hp=Math.min(player.maxHp,player.hp+val);toast(`+${val} HP`,'g');}
  else{const c=gc(val);if(c){battle.deck.push(c);toast(`获得：${c.name}`,'g');}}
  renderHud();renderTokens();setTimeout(backToMap,600);
}

function startFusion(){window._fusionSel=[];renderFusionUI();}
function renderFusionUI(){
  const sel=window._fusionSel||[];
  const kn=k=>k==='atk'?'攻击':k==='def'?'防御':k==='skl'?'技能':'诅咒';
  const validCards=battle.deck.filter(c=>c.rar!=='curse');
  let h=`<div class="ovd">选择 2-5 张牌熔合。同名牌稳定，差异大则充满变数（可能产生废牌）。</div>`;
  h+=`<div style="font-size:10px;color:var(--text2);margin-bottom:8px">已选 ${sel.length}/5：`;
  if(sel.length)h+=sel.map(i=>`<span style="color:var(--amber);margin:0 3px">${battle.deck[i]?.name||'?'}</span>`).join('+');
  else h+='（无）';
  h+='</div>';
  if(sel.length>=2){
    const sc=sel.map(i=>battle.deck[i]);const vals=sc.map(c=>cardValue(c));
    const totalV=vals.reduce((s,v)=>s+v,0),avgV=totalV/sc.length;
    const nameDivers=new Set(sc.map(c=>c.name)).size/sc.length;
    const kindDivers=new Set(sc.map(c=>c.kind)).size/sc.length;
    const stab=Math.max(0,1-nameDivers*.7-kindDivers*.3);
    const minR=Math.round(totalV*.7*(stab>.7?.75:-0.5)),maxR=Math.round(totalV*.7*(stab>.7?1.4:3.0));
    h+=`<div style="margin:0 0 8px;padding:5px 10px;border:1px solid var(--crack2);font-size:9px;color:var(--text2)">稳定性 ${Math.round(stab*100)}% · 总价值 ${totalV}g · 预估 ${minR}~${maxR}g</div>`;
  }
  validCards.forEach((c,ci)=>{
    const ri=battle.deck.indexOf(c);const isSel=sel.includes(ri);
    const d=(c.desc||'').replace('{atk}',c.atk||0).replace('{blk}',c.blk||0).replace('{heal}',c.heal||0).replace('{str}',c.str||0);
    const val=cardValue(c);
    h+=`<div class="rw${isSel?' rw-sel':''}" onclick="toggleFusion(${ri})" style="${isSel?'border-color:var(--violet);background:rgba(106,58,154,.15)':''}">
      <div class="rwa">${c.art}</div><div class="rwi"><div class="rwn">${c.name} ${c.upgradeCount?`<span style="color:var(--slime);font-size:9px;font-weight:700">+${c.upgradeCount}</span>`:''} <span style="color:var(--amber);font-size:8px">≈${val}g</span></div>
      <div class="rwd"><span style="color:var(--text3)">${kn(c.kind)} ◆${c.cost}</span> · ${d}</div></div>
      ${isSel?'<span style="color:var(--violet);font-size:13px;flex-shrink:0">✓</span>':''}
    </div>`;
  });
  h+=`<div style="display:flex;gap:8px;margin-top:10px">
    <button class="ovbtn" style="flex:1;margin:0" onclick="executeFusion()" ${sel.length<2?'disabled':''}>🔮 熔合 (${sel.length}张)</button>
    <button class="ovbtn" style="flex:1;margin:0" onclick="renderBlacksmithMain()">取消</button>
  </div>`;
  document.getElementById('ovb').innerHTML=h;
}
function toggleFusion(ri){
  const sel=window._fusionSel||[];const i=sel.indexOf(ri);
  if(i>=0)window._fusionSel=sel.filter(x=>x!==ri);
  else if(sel.length<5)window._fusionSel=[...sel,ri];
  else{toast('最多选5张','r');return;}
  renderFusionUI();
}
function executeFusion(){
  const sel=window._fusionSel||[];if(sel.length<2){toast('至少选2张','r');return;}
  const sc=sel.map(i=>battle.deck[i]);
  const vals=sc.map(c=>cardValue(c));const totalV=vals.reduce((s,v)=>s+v,0);
  const nameDivers=new Set(sc.map(c=>c.name)).size/sc.length;
  const kindDivers=new Set(sc.map(c=>c.kind)).size/sc.length;
  const stab=Math.max(0,1-nameDivers*.7-kindDivers*.3);
  const roll=Math.random();
  let mod=stab>.8?0.75+roll*.65:stab>.5?0.5+roll*1.3:-0.3+roll*3.3;
  const targetV=Math.round(totalV*.7*mod);
  // Remove selected cards
  [...sel].sort((a,b)=>b-a).forEach(i=>battle.deck.splice(i,1));
  window._fusionSel=[];
  if(targetV<=0){
    const waste={id:'fusewaste_'+Date.now(),name:'熔合废品',art:'💔',kind:'crs',rar:'curse',cost:0,desc:'占用手牌，回合结束损失1HP',curseTick:1,unplayable:true};
    battle.deck.push(waste);toast('熔合失败！产生了废牌','r');
  }else{
    const result=buildFusionCard(sc,targetV);battle.deck.push(result);
    const grade=mod>=2?'⚡ 神铸':mod>=1.3?'✓ 精良':mod<0.5?'⚠ 粗糙':'普通';
    toast(`熔合${grade}：${result.name} ≈${targetV}g`,mod>=1?'g':'');
  }
  setTimeout(backToMap,600);
}
function buildFusionCard(sources,val){
  const kindC={};sources.forEach(c=>{kindC[c.kind]=(kindC[c.kind]||0)+1;});
  const domKind=Object.entries(kindC).sort((a,b)=>b[1]-a[1])[0][0];
  const rar=val>=65?'rare':val>=35?'uncommon':'common';
  const artMap={atk:['⚔','🗡','💢'],def:['🛡','🌊','🏰'],skl:['✨','💎','🔮']};
  const art=(artMap[domKind]||['⚡'])[Math.floor(Math.random()*(artMap[domKind]||['⚡']).length)];
  const rarPfx=rar==='rare'?'神':rar==='uncommon'?'精':'';
  const nm=`${rarPfx}熔合·${domKind==='atk'?'剑':domKind==='def'?'盾':'法'}`;
  let r={id:'fus_'+Date.now(),name:nm,art,rar,kind:domKind,desc:'',cost:0,upgraded:false};
  if(domKind==='atk'){r.cost=val<22?0:val<50?1:2;r.atk=Math.round(val/(r.cost===0?1.4:r.cost===1?1:0.8)/2);r.desc=`造成 <b>${r.atk}</b> 伤害`;}
  else if(domKind==='def'){r.cost=val<18?0:val<42?1:2;r.blk=Math.round(val/(r.cost===0?1.4:r.cost===1?1:0.8)/1.5);r.desc=`获得 <b>${r.blk}</b> 格挡`;}
  else{
    const hasDur=sources.some(c=>c.dur);const hasHeal=sources.some(c=>c.heal);const hasPoison=sources.some(c=>c.poison);
    r.cost=val<22?0:val<50?1:2;
    if(hasDur&&val>=35){r.str=Math.max(1,Math.round(val/8));r.dur=999;r.desc=`【全场】攻击 <b>+${r.str}</b>`;}
    else if(hasPoison){r.poison=Math.max(2,Math.round(val/5));r.desc=`施加 <b>${r.poison}</b> 层中毒`;}
    else if(hasHeal){r.heal=Math.max(3,Math.round(val/1.5));r.exhaust=true;r.desc=`回复 <b>${r.heal}</b> HP（消耗）`;}
    else{r.draw=Math.max(1,Math.round(val/7));r.desc=`摸 <b>${r.draw}</b> 张牌`;}
  }
  return r;
}

let _ac=null;
function ac(){if(!_ac){try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return _ac;}
function sfx(freq,dur,type='square',vol=0.12,sweep=0){
  try{
    const ctx=ac();if(!ctx)return;
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);
    if(sweep)o.frequency.linearRampToValueAtTime(freq+sweep,ctx.currentTime+dur*.7);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur+.05);
  }catch(e){}
}

function csNextLine(){

function csTypeHtml(el,html,done){
  // Strip tags for typing, restore them at end for simplicity
  el.innerHTML=html+'<span class="cs-cursor"></span>';el.classList.add('vis');
  // Actually reveal char by char by building up innerHTML
  el.innerHTML='<span class="cs-cursor"></span>';
  el.classList.add('vis');
  const plain=html.replace(/<[^>]*>/g,'');const totalChars=plain.length;let typed=0;
  const stripped=html;let result='';let tagBuffer='';let inTag=false;let charIdx=0;
  const source=[...stripped];
  function step(){
    if(charIdx>=source.length){el.innerHTML=stripped;done?.();return;}
    const ch=source[charIdx];charIdx++;
    if(ch==='<'){inTag=true;tagBuffer='<';}
    else if(inTag){tagBuffer+=ch;if(ch==='>'){inTag=false;result+=tagBuffer;tagBuffer='';}}
    else{result+=ch;typed++;}
    el.innerHTML=result+'<span class="cs-cursor"></span>';
    const delay=typed<totalChars*.3?38:typed<totalChars*.7?32:42;
    _csTimer=setTimeout(step,delay);
  }
  step();
}

        <button class="sv-del" onclick="event.stopPropagation();deleteSaveSlot(${sv.slot})" title="删除">✕</button>
      </div>`
  ).join('');
  document.getElementById('hv-main').style.display='none';
  document.getElementById('hv-saves').style.display='flex';
}
function loadSlot(n){
  const ok=SM.load(n);
  if(ok){toast('存档已加载','g');}
  else{toast('存档已损坏，已清除','r');SM.clear(n);showSaveSelect();}
}
function deleteSaveSlot(n){
  SM.clear(n);
  if(SM.listAll().every(s=>s.empty)){showHome();}
  else{showSaveSelect();}
}
showHome();
</script>
</body>
</html>
