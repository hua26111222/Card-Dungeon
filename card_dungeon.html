<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>卡牌地牢</title>
<!-- PWA：让手机浏览器可以把这个页面"添加到主屏幕"，像装了个App一样打开、离线也能玩 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0a18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="卡牌地牢">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --void:#07050a;--s1:#100d14;--s2:#181420;--s3:#201a2c;--s4:#28223a;
  --crack:#352d45;--crack2:#4a3f62;
  --blood:#8b1a1a;--blood2:#6b1010;--blood3:#3d0808;
  --gore:#c0392b;--gore2:#e05040;
  --bone:#c8a96e;--bone2:#a07840;--bone3:#7a5820;
  --amber:#d4881a;--amber2:#a06010;
  --mold:#2d5a27;--slime:#5abf44;
  --ice:#3a5a8a;--frost:#7aaabf;
  --soul:#6a3a9a;--violet:#9a5abf;
  --ash:#8a8070;--ash2:#5a5048;--ash3:#302820;
  --text:#c8b89a;--text2:#8a7860;--text3:#5a4a3a;
  --fs:'ZCOOL XiaoWei','Noto Serif SC',serif;--fg:'Cinzel Decorative','ZCOOL XiaoWei',serif;--fm:'Courier New',monospace;
}
html,body{background:var(--void);color:var(--text);font-family:var(--fm);font-size:15px;min-height:100vh;overflow-x:hidden}
#app{max-width:900px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0px,rgba(0,0,0,.12) 1px,transparent 1px,transparent 24px),
    repeating-linear-gradient(90deg,rgba(0,0,0,.08) 0px,rgba(0,0,0,.08) 1px,transparent 1px,transparent 24px),var(--s1)}

/* HUD */
#hud{background:linear-gradient(180deg,#0d0a12 0%,#100d18 100%);border-bottom:1px solid var(--crack);
  box-shadow:0 2px 16px rgba(0,0,0,.9),inset 0 1px 0 rgba(200,169,110,.05);
  display:flex;align-items:stretch;flex-shrink:0;z-index:100;position:relative}
.hl{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 14px;
  border-right:1px solid var(--crack);background:linear-gradient(90deg,rgba(139,26,26,.1),transparent)}
.gn{font-family:var(--fg);font-size:17px;font-weight:900;color:var(--bone);letter-spacing:5px;
  text-shadow:0 0 24px rgba(200,169,110,.5),0 0 48px rgba(139,26,26,.3),2px 2px 0 #000}
.gc{font-size:12px;color:var(--text2);letter-spacing:1px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.hs{display:flex}.hss{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 10px;border-left:1px solid var(--crack);min-width:52px;gap:1px}
.hi{font-size:16px;line-height:1;filter:drop-shadow(0 0 5px currentColor)}
.hv{font-family:var(--fs);font-size:20px;font-weight:900;line-height:1;text-shadow:1px 1px 0 #000}
.hl2{font-size:11px;color:var(--text2);letter-spacing:2px;margin-top:1px}
.s-hp .hi,.s-hp .hv{color:var(--gore2);text-shadow:0 0 12px var(--blood),1px 1px 0 #000}
.s-ap .hi,.s-ap .hv{color:var(--frost);text-shadow:0 0 10px var(--ice),1px 1px 0 #000}
.s-g  .hi,.s-g  .hv{color:var(--amber);text-shadow:0 0 10px var(--bone3),1px 1px 0 #000}
.s-dr .hi,.s-dr .hv{color:var(--violet);text-shadow:0 0 10px var(--soul),1px 1px 0 #000}

/* 筹码栏 */
#tbar{display:none}
.tg{display:flex;align-items:center;gap:2px;padding-right:9px;margin-right:7px;border-right:1px solid var(--crack2)}
.tg:last-child{border:none;margin:0;padding:0}
.tl{font-size:7px;color:var(--text3);letter-spacing:2px;margin-right:3px;flex-shrink:0;font-style:italic}
.tok{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;font-size:8px;font-weight:900;border:1px solid;flex-shrink:0}
.th{background:var(--blood3);border-color:var(--blood2);color:var(--gore2);box-shadow:0 0 4px rgba(139,26,26,.5)}
.ta{background:var(--ice);border-color:var(--frost);color:var(--frost);box-shadow:0 0 3px rgba(58,90,138,.4);opacity:.7}
.tgo{background:rgba(100,75,15,.3);border-color:var(--bone3);color:var(--bone)}
.tov{font-size:8px;color:var(--text3);margin-left:2px;font-style:italic}

/* 词缀横幅 */
#mb{padding:5px 12px;border-bottom:1px solid;display:none;align-items:center;gap:8px;
  font-size:10px;flex-shrink:0;background:rgba(0,0,0,.5)}
.mi{font-size:13px;flex-shrink:0;filter:drop-shadow(0 0 4px currentColor)}
.mn{font-weight:700;letter-spacing:1px;margin-bottom:1px}
.md{font-size:8px;opacity:.75;font-style:italic}

/* 主容器 */
#main{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--crack) var(--void)}
#main::-webkit-scrollbar{width:3px}
#main::-webkit-scrollbar-thumb{background:var(--crack2)}

/* ═══ 地图 ═══ */
.fbar{background:linear-gradient(180deg,var(--s2),var(--s1));border-bottom:1px solid var(--crack);
  padding:8px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,.6)}
.fl{font-family:var(--fs);font-size:16px;font-weight:700;color:var(--bone);letter-spacing:2px;
  text-shadow:0 0 12px rgba(200,169,110,.3),1px 1px 0 #000}
.fr{display:flex;align-items:center;gap:8px}
.psb{font-size:11px;padding:2px 8px;border:1px solid;letter-spacing:1px;font-style:italic;background:rgba(0,0,0,.4)}
.fp{font-size:11px;color:var(--text3);letter-spacing:1px}
#mwrap{background:radial-gradient(ellipse at 50% 40%,rgba(74,26,122,.1),transparent 65%),linear-gradient(180deg,var(--s1),var(--void));border-bottom:1px solid var(--crack);padding:6px 0}
.mprompt{padding:6px 14px 2px;font-size:11px;color:var(--text3);letter-spacing:3px;font-style:italic;text-align:center}
#mchooser{display:flex;flex-direction:column;gap:4px;padding:6px 8px 4px}
.mrow{display:flex;gap:4px;justify-content:center;transition:opacity .3s,transform .3s}
.mrow-d2{opacity:.42;transform:scale(.88);pointer-events:none}
.mrow-d1{opacity:.70;transform:scale(.95);pointer-events:none}
.mrow-act{position:relative}
.mplayer-row{display:flex;justify-content:center;gap:4px;padding:3px 0 1px}
.mplayer-cell{flex:1 1 0;max-width:58px;min-width:28px;text-align:center;font-size:9px;letter-spacing:1px}
.mcard{flex:1 1 0;max-width:58px;min-width:28px;height:82px;border-radius:5px;border:2px solid;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s,opacity .2s;overflow:hidden;
  background:linear-gradient(160deg,#1a1428,#0d0a18);opacity:1;pointer-events:none}
.mrow-act .mcard:not(.reach){opacity:.2;filter:saturate(.25)}
.mcard.reach{opacity:1;cursor:pointer;pointer-events:auto}
.mcard.reach:hover{transform:translateY(-6px) scale(1.07);box-shadow:0 12px 22px rgba(0,0,0,.8),0 0 10px rgba(200,169,110,.2)}
.mcard.reach:active{transform:translateY(-1px) scale(.97)}
.mcard.path-dim{opacity:.30!important;filter:saturate(.2)!important}
.mcard-boss{animation:bpulse 2s ease-in-out infinite}
.mcard-blind{border-style:dashed!important;background:rgba(10,7,18,.97)!important}
.mcsuit{position:absolute;top:3px;left:5px;font-size:11px;font-weight:900;line-height:1}
.mclabel{position:absolute;top:3px;right:5px;font-size:8px;font-weight:700}
.mcicon{font-size:20px;margin-bottom:2px}
.mctype{font-size:7px;letter-spacing:1px;font-weight:700;text-align:center;padding:0 2px}
.mchint{font-size:6px;opacity:.7;margin-top:1px;letter-spacing:.5px;font-style:italic}
/* 篝火·铁匠铺 blessing card */
.bless-row{display:flex;gap:10px;justify-content:center;padding:8px 0 4px}
.bless-card{flex:1;max-width:120px;background:linear-gradient(160deg,var(--s3),var(--s4));
  border:1px solid var(--crack2);border-radius:5px;padding:12px 8px;text-align:center;
  cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s}
.bless-card:hover{border-color:var(--amber2);transform:translateY(-4px);box-shadow:0 8px 18px rgba(0,0,0,.6),0 0 8px rgba(212,136,26,.2)}
.bless-card:active{transform:translateY(0);box-shadow:none}
.bless-art{font-size:22px;margin-bottom:5px}
.bless-name{font-family:var(--fs);font-size:12px;color:var(--bone);font-weight:700;margin-bottom:4px}
.bless-desc{font-size:9px;color:var(--text2);line-height:1.5;font-style:italic}
.mhist{padding:4px 14px 6px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;border-top:1px solid var(--crack);min-height:26px}
.mhistitem{font-size:15px;opacity:.35;cursor:default}
.tav-sec-title{font-size:10px;color:var(--text3);letter-spacing:3px;padding:10px 0 5px;text-align:center;border-top:1px solid var(--crack);margin-top:8px;font-style:italic}
.abuf{color:var(--slime);font-weight:700;font-size:9px;vertical-align:middle}
.hcrb{position:absolute;bottom:2px;right:3px;font-size:7px;padding:0 2px;border:1px solid;background:rgba(0,0,0,.75);z-index:5;letter-spacing:0;line-height:1.3}
.hcrb.rc{color:var(--ash);border-color:var(--ash2)}
.hcrb.ru{color:var(--frost);border-color:var(--ice)}
.hcrb.rr{color:var(--amber);border-color:var(--amber2)}
.hcrb.rcu{color:var(--soul);border-color:var(--violet)}

/* ═══ 战斗 KOF格斗风格 ═══ */
#bv{display:none;flex-direction:column;height:calc(100dvh - 62px)}
.bv-top{flex:0 0 50%;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.bv-bottom{flex:0 0 50%;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.bscene{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:stretch;
  background:#07050e}
.bscene::before{content:'';position:absolute;left:0;right:0;bottom:82px;height:2px;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,transparent 0%,rgba(200,169,110,.22) 25%,rgba(200,169,110,.1) 50%,rgba(200,169,110,.22) 75%,transparent 100%);
  box-shadow:0 0 18px rgba(200,169,110,.08)}
.bscene::after{content:'';position:absolute;bottom:82px;left:6%;right:6%;height:12px;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 100%,rgba(0,0,0,.75) 0%,transparent 70%)}
.etag{position:absolute;top:5px;left:50%;transform:translateX(-50%);z-index:5;
  font-size:9px;color:rgba(200,169,110,.55);letter-spacing:2px;font-style:italic;
  background:rgba(0,0,0,.45);padding:2px 10px;white-space:nowrap;pointer-events:none}
.bchar-p{flex:0 0 43%;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;
  background:linear-gradient(180deg,rgba(58,90,138,.06) 0%,transparent 60%)}
.bchar-p::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:3;
  background:linear-gradient(90deg,var(--ice),var(--frost),var(--ice))}
.bchar-e{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;
  background:linear-gradient(180deg,rgba(139,26,26,.07) 0%,transparent 65%)}
.bchar-e::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:3;
  background:linear-gradient(90deg,var(--blood2),var(--gore),var(--blood2))}
.pav{flex:1;width:100%;min-height:50px;display:flex;align-items:flex-end;justify-content:center;font-size:58px;
  padding-bottom:4px;position:relative;overflow:hidden;filter:drop-shadow(0 4px 10px rgba(0,0,0,.8));
  animation:idle-bob 2.1s ease-in-out infinite}
.ep{flex:1;width:100%;min-height:60px;display:flex;align-items:flex-end;justify-content:center;font-size:78px;
  padding-bottom:2px;position:relative;overflow:hidden;filter:drop-shadow(0 4px 12px rgba(0,0,0,.9))}
.ep::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,transparent 0,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 3px);pointer-events:none}
.ep.fe{filter:drop-shadow(0 4px 12px rgba(0,0,0,.9)) drop-shadow(0 0 18px rgba(200,136,26,.5))}
.ep.fb{animation:bpulse 3s ease-in-out infinite;filter:drop-shadow(0 4px 12px rgba(0,0,0,.9)) drop-shadow(0 0 22px rgba(154,90,191,.6))}
@keyframes bpulse{0%,100%{filter:drop-shadow(0 4px 12px rgba(0,0,0,.9)) drop-shadow(0 0 14px rgba(106,58,154,.4))}50%{filter:drop-shadow(0 4px 12px rgba(0,0,0,.9)) drop-shadow(0 0 28px rgba(154,90,191,.8))}}
.binfo-p{width:100%;text-align:center;background:rgba(0,0,0,.84);border-top:1px solid rgba(122,170,191,.18);padding:6px 7px 7px;flex-shrink:0;z-index:3}
.binfo-e{width:100%;text-align:center;background:rgba(0,0,0,.84);border-top:1px solid rgba(139,26,26,.28);padding:6px 7px 7px;flex-shrink:0;z-index:3}
.en{font-family:var(--fs);font-size:14px;font-weight:900;letter-spacing:1px;margin-bottom:2px;color:var(--text);text-shadow:1px 1px 0 #000}
.en.eli{color:var(--amber);text-shadow:0 0 14px rgba(212,136,26,.4),1px 1px 0 #000}
.en.bos{color:var(--violet);text-shadow:0 0 18px rgba(154,90,191,.5),1px 1px 0 #000;animation:nflicker 5s ease-in-out infinite}
@keyframes nflicker{0%,94%,100%{opacity:1}97%{opacity:.8}}
.hlt{font-size:11px;color:var(--text);letter-spacing:1px;margin-bottom:2px;font-style:italic}
.hbg{height:7px;background:var(--void);border:1px solid var(--crack);overflow:hidden;
  max-width:110px;margin:2px auto 4px;
  box-shadow:inset 0 1px 4px rgba(0,0,0,.8);position:relative}
.hbg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 9px,rgba(0,0,0,.25) 9px,rgba(0,0,0,.25) 10px);z-index:2;pointer-events:none}
.hf{height:100%;transition:width .4s cubic-bezier(.4,0,.2,1);position:relative}
.hf::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.15)}
.hf.ef{background:linear-gradient(90deg,var(--blood2),var(--blood),var(--gore));box-shadow:0 0 8px rgba(139,26,26,.6)}
.hf.pf{background:linear-gradient(90deg,var(--mold),#3a8a2a,var(--slime));box-shadow:0 0 6px rgba(45,90,39,.5)}
.hf.lw{background:linear-gradient(90deg,var(--ash3),var(--amber2),var(--amber))}
.hf.cr{background:linear-gradient(90deg,#4a0000,var(--blood),var(--gore2));animation:bpuls2 .6s ease-in-out infinite}
@keyframes bpuls2{0%,100%{box-shadow:0 0 8px rgba(192,57,43,.6)}50%{box-shadow:0 0 22px rgba(224,80,64,.9)}}
.etk{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:0;justify-content:center}
.ibox{display:inline-flex;align-items:center;gap:4px;background:var(--blood3);border:1px solid var(--blood2);
  padding:3px 6px;font-size:10px;color:var(--gore2);letter-spacing:1px;font-style:italic;
  box-shadow:0 0 8px rgba(139,26,26,.3)}
.sr{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;justify-content:center}
.sb{font-size:9px;padding:1px 5px;border:1px solid;letter-spacing:1px;font-style:italic;background:rgba(0,0,0,.4)}
.ss{color:var(--gore2);border-color:var(--blood2)}.sbk{color:var(--frost);border-color:var(--ice)}
.sp{color:var(--slime);border-color:var(--mold)}.sw{color:var(--violet);border-color:var(--soul)}
.sv{color:var(--amber);border-color:var(--amber2)}
.pn{font-size:11px;color:var(--bone);letter-spacing:2px;margin-bottom:2px;font-style:italic;text-shadow:0 0 14px currentColor;transition:color .5s}
.pap{display:flex;align-items:center;gap:4px;justify-content:center;margin-top:3px}
.papt{font-size:9px;color:var(--text3);letter-spacing:2px;font-style:italic;padding:0 3px}
.pst{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px;justify-content:center}
.pht{font-size:13px;letter-spacing:1px;color:var(--gore2);font-style:italic;font-weight:700}
.bb{display:inline-flex;align-items:center;gap:3px;background:rgba(58,90,138,.25);border:1px solid var(--ice);
  padding:2px 6px;font-size:11px;color:var(--frost);box-shadow:0 0 8px rgba(58,90,138,.3);font-weight:700}
.hz{flex:1;min-height:0;padding:10px 0 6px;background:linear-gradient(180deg,#090711,var(--s1));overflow:visible;display:flex;flex-direction:column}
.hh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:0 14px}
.hlb{font-size:12px;color:var(--text2);letter-spacing:3px;font-style:italic}
.hlb::before{content:'✦ ';color:var(--blood2);font-size:7px}
.apb{display:flex;align-items:center;gap:4px;background:rgba(58,90,138,.2);border:1px solid var(--ice);
  padding:4px 10px;font-size:13px;color:var(--frost);box-shadow:0 0 8px rgba(58,90,138,.25);font-weight:700}
.app{width:9px;height:9px;border:1px solid var(--ice);display:inline-block;background:var(--void)}
.app.on{background:var(--frost);box-shadow:0 0 4px var(--frost)}
.hcs{display:flex;overflow-x:auto;overflow-y:visible;padding:8px 18px 20px;flex:1;align-items:flex-end;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hcs::-webkit-scrollbar{display:none}

/* 手牌：扑克牌比例 5:7 */
.hc{flex-shrink:0;width:84px;aspect-ratio:5/7;background:linear-gradient(160deg,#1e1820,#171220);
  border:1px solid var(--crack2);box-shadow:inset 0 0 0 1px rgba(255,255,255,.02),2px 2px 0 var(--void);
  cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;
  margin-right:-20px;z-index:1}
.hc:last-child{margin-right:0}
.hc::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,transparent 0,transparent 6px,rgba(255,255,255,.006) 6px,rgba(255,255,255,.006) 7px);
  pointer-events:none;z-index:1}
.hc:active{transform:translateY(-8px) scale(1.06);box-shadow:2px 10px 0 var(--void)}
.hc.unp{opacity:.28;pointer-events:none}
.hc.atk{border-top:2px solid var(--blood)}.hc.def{border-top:2px solid var(--mold)}
.hc.skl{border-top:2px solid var(--ice)}.hc.pwr{border-top:2px solid var(--soul)}
.hc.crs{border-top:2px solid var(--ash3);filter:saturate(.5)}
.hcc{position:absolute;top:3px;left:3px;width:18px;height:18px;
  background:radial-gradient(circle at 40% 35%,var(--frost) 0%,var(--ice) 50%,var(--void) 100%);
  border:1px solid var(--frost);display:flex;align-items:center;justify-content:center;
  font-family:var(--fs);font-size:11px;font-weight:900;color:#fff;
  box-shadow:0 0 7px rgba(106,154,191,.4),1px 1px 0 var(--void);z-index:3}
.hcc.c0{background:radial-gradient(circle at 40% 35%,var(--ash2),var(--ash3));border-color:var(--ash2);color:var(--ash);box-shadow:none}
.hcc.c2{background:radial-gradient(circle at 40% 35%,var(--amber),var(--amber2),var(--void));border-color:var(--amber);color:var(--bone);box-shadow:0 0 7px rgba(212,136,26,.4)}
.hcc.c3{background:radial-gradient(circle at 40% 35%,var(--gore),var(--blood),var(--void));border-color:var(--gore);color:var(--text);box-shadow:0 0 7px rgba(192,57,43,.5)}
.hca{height:38px;background:linear-gradient(160deg,var(--s3),var(--s4));
  display:flex;align-items:center;justify-content:center;font-size:19px;
  border-bottom:1px solid var(--crack);position:relative;overflow:hidden;z-index:2}
.hca::after{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,transparent 0,transparent 2px,rgba(0,0,0,.14) 2px,rgba(0,0,0,.14) 3px)}
.hcb{padding:3px 4px 3px;position:relative;z-index:2}

/* ── KOF 格斗风格动画 ── */
/* 角色空闲晃动 */
@keyframes idle-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes idle-flip{0%,100%{transform:scaleX(-1) translateY(0)}50%{transform:scaleX(-1) translateY(-7px)}}
/* 敌人内层span：镜像朝向玩家 */
.ep-inner{display:block;transform:scaleX(-1);animation:idle-flip 1.85s ease-in-out infinite}
/* 玩家出牌动作 */
@keyframes atk-lunge{
  0%{transform:translateY(0) translateX(0)}
  18%{transform:translateY(-10px) translateX(2px)}
  48%{transform:translateY(-4px) translateX(30px) scale(1.1)}
  78%{transform:translateY(0) translateX(8px)}
  100%{transform:translateY(0) translateX(0)}}
@keyframes def-raise{
  0%,100%{transform:scale(1) rotate(0) translateY(0)}
  40%{transform:scale(1.1) rotate(-10deg) translateY(-10px)}}
@keyframes skl-cast{
  0%,100%{transform:scale(1) translateY(0)}
  30%{transform:scale(1.14) translateY(-14px)}
  65%{transform:scale(1.05) translateY(-5px)}}
@keyframes p-hit{
  0%,100%{transform:translateX(0)}
  30%{transform:translateX(-16px)}
  70%{transform:translateX(-4px)}}
/* 敌人动作（含scaleX(-1)基础变换） */
@keyframes e-hit{
  0%,100%{transform:scaleX(-1) translateX(0)}
  25%{transform:scaleX(-1) translateX(20px)}
  68%{transform:scaleX(-1) translateX(5px)}}
@keyframes e-atk{
  0%,100%{transform:scaleX(-1) translateX(0) translateY(0)}
  22%{transform:scaleX(-1) translateX(-4px) translateY(-9px)}
  52%{transform:scaleX(-1) translateX(-32px) translateY(-2px)}
  80%{transform:scaleX(-1) translateX(-8px) translateY(0)}}
/* 动作触发类（!important 覆盖空闲动画） */
.pav.a-atk{animation:atk-lunge .52s ease-out forwards!important}
.pav.a-def{animation:def-raise .48s ease-out forwards!important}
.pav.a-skl{animation:skl-cast .55s ease-out forwards!important}
.pav.a-hit{animation:p-hit .38s ease-out forwards!important}
.ep-inner.a-hit{animation:e-hit .40s ease-out forwards!important}
.ep-inner.a-atk{animation:e-atk .58s ease-out forwards!important}
/* ── 受击/格挡视觉反馈 ── */
@keyframes dmg-shake{0%,100%{transform:scaleX(-1) translateX(0)}15%{transform:scaleX(-1) translateX(14px) rotate(4deg) scale(1.07)}35%{transform:scaleX(-1) translateX(-10px) rotate(-3deg)}55%{transform:scaleX(-1) translateX(7px)}75%{transform:scaleX(-1) translateX(-4px)}}
@keyframes dmg-flash{0%{filter:brightness(1) drop-shadow(0 0 0 transparent)}30%{filter:brightness(5) saturate(0) drop-shadow(0 0 20px #fff)}100%{filter:brightness(1) drop-shadow(0 4px 12px rgba(0,0,0,.9))}}
@keyframes blk-pop{0%,100%{transform:scale(1)}40%{transform:scale(1.55);filter:drop-shadow(0 0 10px rgba(100,200,255,.95))}}
@keyframes btxt-in{0%{opacity:0;transform:translateX(-50%) scale(.3) skewX(-5deg)}55%{opacity:1;transform:translateX(-50%) scale(1.15) skewX(-5deg)}100%{opacity:1;transform:translateX(-50%) scale(1) skewX(-5deg)}}
@keyframes speech-pop{0%{opacity:0;transform:scale(.7) translateY(5px)}70%{transform:scale(1.06)}100%{opacity:1;transform:none}}
.ep-inner.dmg-hit{animation:dmg-shake .4s cubic-bezier(.36,.07,.19,.97) forwards!important}
.ep-inner.dmg-flash{animation:dmg-flash .32s ease forwards!important}
.pav.a-hit-p{animation:p-hit .3s ease-out forwards!important}
#bbd.blk-pop{animation:blk-pop .32s ease forwards}
#btxt{position:absolute;left:50%;top:34%;transform:translateX(-50%) skewX(-5deg);pointer-events:none;font-family:var(--fs);font-size:22px;font-weight:700;letter-spacing:4px;text-shadow:0 2px 12px rgba(0,0,0,.95),0 0 30px currentColor;z-index:20;white-space:nowrap;display:none;opacity:0}
#btxt.show{display:block;opacity:1;animation:btxt-in .26s cubic-bezier(.23,1,.32,1) forwards}
#blog-feed{position:absolute;left:50%;bottom:10px;transform:translateX(-50%);z-index:18;text-align:center;pointer-events:none;width:92%;max-width:280px}
#blog-feed .bfm{display:block;font-size:11px;padding:3px 10px;background:rgba(7,5,14,.85);border:1px solid var(--crack2);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;animation:bfin .25s ease forwards}
#blog-feed .bfm.blog-pl{color:var(--frost)}
#blog-feed .bfm.blog-en{color:#e08a8a}
#blog-feed .bfm.blog-sys{color:var(--text2)}
@keyframes bfin{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
#enemy-speech{position:absolute;right:8px;top:16px;max-width:108px;background:rgba(12,6,22,.94);border:1px solid rgba(154,90,191,.55);border-radius:8px 8px 0 8px;padding:6px 8px;font-size:9px;color:var(--bone);z-index:16;pointer-events:none;line-height:1.65;display:none;word-break:break-all;transition:opacity .3s}
#enemy-speech.show{display:block;animation:speech-pop .18s ease forwards}
#enemy-speech::after{content:'';position:absolute;bottom:-7px;right:10px;border-width:7px 7px 0;border-style:solid;border-color:rgba(154,90,191,.55) transparent transparent}
/* ── "红白机"式打击感：全屏震动/闪光/残血心跳/伤害数字分级 ── */
@keyframes scr-shake{
  0%,100%{transform:translate(0,0)}
  20%{transform:translate(-6px,3px)}
  40%{transform:translate(5px,-4px)}
  60%{transform:translate(-4px,-2px)}
  80%{transform:translate(3px,3px)}}
@keyframes scr-shake-big{
  0%,100%{transform:translate(0,0)}
  10%{transform:translate(-11px,7px) rotate(-.6deg)}
  25%{transform:translate(10px,-8px) rotate(.6deg)}
  40%{transform:translate(-9px,-5px)}
  55%{transform:translate(8px,5px)}
  70%{transform:translate(-6px,3px)}
  85%{transform:translate(4px,-3px)}}
.bscene.scr-shake{animation:scr-shake .35s cubic-bezier(.36,.07,.19,.97)}
.bscene.scr-shake-big{animation:scr-shake-big .5s cubic-bezier(.36,.07,.19,.97)}
#flashfx{position:fixed;inset:0;z-index:9996;pointer-events:none;opacity:0}
#flashfx.f-white{background:#fff;mix-blend-mode:screen;animation:flash-pop .25s ease-out forwards}
#flashfx.f-red{background:radial-gradient(ellipse at center,rgba(200,20,20,.08) 25%,rgba(160,10,10,.7) 100%);animation:flash-pop-red .32s ease-out forwards}
@keyframes flash-pop{0%{opacity:.85}100%{opacity:0}}
@keyframes flash-pop-red{0%{opacity:.9}100%{opacity:0}}
#lowhp-vig{position:fixed;inset:0;z-index:9995;pointer-events:none;opacity:0;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(139,10,10,.55) 100%)}
#lowhp-vig.show{animation:heartbeat-pulse 1.1s ease-in-out infinite}
@keyframes heartbeat-pulse{0%,100%{opacity:.22}12%{opacity:.75}24%{opacity:.32}36%{opacity:.62}60%{opacity:.22}}
.df.df-big{font-size:34px;text-shadow:2px 2px 0 var(--void),0 0 14px rgba(255,180,60,.85)}
.df.df-huge{font-size:46px;text-shadow:2px 2px 0 var(--void),0 0 22px rgba(255,80,40,.95);animation:fup-huge .95s ease-out forwards}
@keyframes fup-huge{0%{opacity:1;transform:translateY(0) scale(1.6) rotate(-3deg)}30%{transform:translateY(-10px) scale(1.3) rotate(2deg)}70%{opacity:.9;transform:translateY(-52px) scale(1.05)}100%{opacity:0;transform:translateY(-86px) scale(.8)}}
/* 地图节点选中高亮 */
.mcard.mc-sel{border-width:2px!important;
  transform:translateY(-10px) scale(1.1)!important;
  box-shadow:0 0 20px rgba(200,169,110,.5),0 12px 26px rgba(0,0,0,.9)!important}
@media(min-width:600px){
  #app{max-width:100%}
  #bv{min-height:calc(100vh - 64px)}
  .ep{font-size:78px}
  .hbg{height:11px}
  .hh{padding:0 22px}
  .hc{width:100px;margin-right:-26px}
  .hcc{width:22px;height:22px;font-size:13px}
  .hca{height:46px;font-size:24px}
  .hcn{font-size:11px}
  .hct{font-size:8px}
  .hcd{font-size:10px}
  .en{font-size:20px}
  .apb{font-size:13px;padding:4px 10px}
  .app{width:9px;height:9px}
  .dst{font-size:13px;padding:6px 16px}
  .bac{padding:10px 16px}
}
@media(min-width:900px){
  .ep{font-size:90px}
  .hc{width:112px;margin-right:-30px}
  .hca{height:52px;font-size:28px}
  .hcn{font-size:12px}
  .hcd{font-size:11px}
}
/* ═══ 主菜单 ═══ */
#hv{display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 88px);text-align:center;padding:28px 20px;
  background:radial-gradient(ellipse at 50% 30%,rgba(139,26,26,.12),transparent 65%),
    linear-gradient(180deg,var(--s1),var(--void));position:relative}
#hv::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 39px,rgba(255,255,255,.006) 39px,rgba(255,255,255,.006) 40px),
    repeating-linear-gradient(90deg,transparent 0,transparent 39px,rgba(255,255,255,.006) 39px,rgba(255,255,255,.006) 40px);pointer-events:none}
.hvtit{font-family:var(--fg);font-size:26px;font-weight:900;color:var(--bone);letter-spacing:8px;
  text-shadow:0 0 32px rgba(200,169,110,.4),0 0 64px rgba(139,26,26,.2),2px 2px 0 #000;margin-bottom:8px}
.hvsub{font-size:11px;color:var(--text3);letter-spacing:4px;font-style:italic;margin-bottom:28px}
.hvdiv{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--crack2),transparent);margin:0 auto 24px}
#hv-main{display:flex;flex-direction:column;align-items:center;width:100%;position:relative;z-index:1}
#hv-saves{display:none;flex-direction:column;align-items:center;width:100%;position:relative;z-index:1}
.hv-btns{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:240px}
.hvbtn{font-family:var(--fm);font-size:12px;letter-spacing:4px;padding:13px 0;width:100%;
  border:1px solid;cursor:pointer;position:relative;touch-action:manipulation;transition:opacity .2s}
.hvbtn:active{transform:translate(1px,1px)}
.hvbtn-c{background:linear-gradient(180deg,rgba(30,70,30,.5),rgba(10,35,10,.7));border-color:var(--mold);color:var(--slime);
  box-shadow:inset 0 1px 0 rgba(90,191,68,.06),0 3px 0 var(--void),0 0 14px rgba(45,90,45,.15)}
.hvbtn-c:disabled{background:rgba(15,15,15,.5);border-color:var(--crack);color:var(--text3);box-shadow:none;cursor:default;opacity:.35;pointer-events:none}
.hvbtn-n{background:linear-gradient(180deg,rgba(100,20,20,.5),rgba(60,10,10,.7));border-color:var(--blood);color:var(--gore2);
  box-shadow:inset 0 1px 0 rgba(192,57,43,.06),0 3px 0 var(--void),0 0 14px rgba(139,26,26,.15)}
/* 存档卡片 */
.sv-wrap{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;max-width:360px;margin:0 auto 6px}
.sv-card{width:100px;min-height:130px;border-radius:7px;
  background:linear-gradient(160deg,#1c1828,#13101e);border:1px solid rgba(200,169,110,.2);
  box-shadow:1px 4px 14px rgba(0,0,0,.9);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;
  padding:10px 8px 8px;position:relative;
  transition:transform .18s cubic-bezier(.2,0,.2,1.2),box-shadow .18s;text-align:center}
.sv-card:hover{transform:translateY(-14px) scale(1.06);box-shadow:2px 20px 28px rgba(0,0,0,.95),0 0 18px rgba(200,169,110,.18)}
.sv-card.sv-empty{opacity:.35;border-style:dashed;cursor:default;pointer-events:none}
.sv-floor{font-family:var(--fs);font-size:13px;font-weight:700;color:var(--bone);letter-spacing:2px;margin-bottom:4px}
.sv-icon{font-size:24px;margin:4px 0}
.sv-title{font-size:8.5px;color:var(--text2);line-height:1.5;margin-top:4px;flex:1;word-break:break-all}
.sv-time{font-size:7.5px;color:var(--text3);font-style:italic;margin-top:6px}
.sv-del{position:absolute;top:3px;right:4px;font-size:9px;background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 4px;font-family:var(--fm)}
.sv-del:hover{color:var(--gore2)}
.hv-back{font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:2px;background:none;border:none;cursor:pointer;margin-top:14px;padding:6px 12px;touch-action:manipulation}
.hv-back:hover{color:var(--text2)}
/* ═══ 过场动画 ═══ */
#cutscene{position:fixed;inset:0;z-index:9999;display:none;flex-direction:column;background:var(--void);animation:cs-in .5s ease-out}
@keyframes cs-in{from{opacity:0}to{opacity:1}}
.cs-body{flex:1;display:flex;overflow:hidden}
.cs-art{width:42%;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 16px;position:relative;overflow:hidden}
.cs-art::after{content:'';position:absolute;right:0;top:0;bottom:0;width:40px;
  background:linear-gradient(90deg,transparent,var(--void))}
.cs-art-icon{font-size:80px;filter:drop-shadow(0 0 40px currentColor);animation:cs-float 3s ease-in-out infinite}
@keyframes cs-float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.05)}}
.cs-art-title{font-family:var(--fs);font-size:14px;letter-spacing:4px;margin-top:16px;text-align:center;text-shadow:0 0 20px currentColor}
.cs-art-sub{font-size:9px;letter-spacing:3px;margin-top:6px;text-align:center;opacity:.6;font-style:italic}
.cs-text-area{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 20px 28px 8px;overflow:hidden}
.cs-chapter{font-size:10px;color:var(--blood2);letter-spacing:5px;margin-bottom:12px;font-style:italic}
.cs-title{font-family:var(--fs);font-size:22px;font-weight:900;color:var(--bone);letter-spacing:4px;
  text-shadow:0 0 24px rgba(200,169,110,.5),2px 2px 0 #000;margin-bottom:16px;line-height:1.3}
.cs-lines{flex:1;overflow:hidden}
.cs-line{font-size:13px;color:var(--text2);line-height:2.1;font-style:italic;opacity:0;transition:opacity .4s;min-height:1.8em}
.cs-line.vis{opacity:1}
.cs-line b{color:var(--bone);font-style:normal}
.cs-cursor{display:inline-block;width:2px;height:13px;background:var(--bone2);margin-left:2px;vertical-align:middle;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cs-footer{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--crack);flex-shrink:0}
.cs-skip{font-size:11px;color:var(--text3);letter-spacing:2px;cursor:pointer;font-style:italic;padding:6px 12px;border:1px solid var(--crack);background:transparent;font-family:var(--fm)}
.cs-skip:hover{color:var(--text2);border-color:var(--crack2)}
.cs-cont{font-size:11px;color:var(--bone);letter-spacing:2px;cursor:pointer;padding:6px 16px;border:1px solid var(--bone2);background:rgba(200,169,110,.08);font-family:var(--fm);display:none}
.cs-cont:hover{background:rgba(200,169,110,.15)}
</style>

function gc(id){const c=DB.find(c=>c.id===id);return c?JSON.parse(JSON.stringify(c)):null;}
// 每种数值效果"值多少分"的统一权重表：cardValue() 打分、CardGen 生成数值时分配预算，
// 两边都从这一份表里取数，不再各写各的系数——生成出来的卡，分数才能真正对应它的预算
const STAT_W={atk:2,blk:1.5,heal:1.5,str:8,draw:7,ap:12,poison:5,weak:6,vuln:6};
function cardValue(c){
  if(!c||c.rar==='curse')return 0;
  if(c.special){
    // Special cards: fixed base scores because their power isn't captured by numeric stat fields
    const sv={soul_strike:60,chaos_shot:40,last_stand:42,martyr:53,catalyze:29,
               phantom_hit:40,heartbreak:27,desperation:37,bloodrush:40,execute:43,
               stagger:38,lockdown:52};
    const rm=c.rar==='rare'?1.5:c.rar==='uncommon'?1.2:1;
    return Math.round((sv[c.special]||40)*rm*(1+(c.upgradeCount||0)*.2));
  }
  const base=(c.atk||0)*STAT_W.atk+(c.atk&&c.times?(c.atk*(c.times-1)*1.5):0)+
    (c.blk||0)*STAT_W.blk+(c.heal||0)*STAT_W.heal+(c.str||0)*STAT_W.str+(c.draw||0)*STAT_W.draw+
    (c.ap||0)*STAT_W.ap+(c.poison||0)*STAT_W.poison+(c.weak||0)*STAT_W.weak+(c.vuln||0)*STAT_W.vuln;
  const cm=[1.4,1,0.8,0.65][Math.min(c.cost||0,3)];
  const rm=c.rar==='rare'?1.5:c.rar==='uncommon'?1.2:1;
  return Math.max(5,Math.round(base*cm*rm*(1+(c.upgradeCount||0)*.18)));
}
function upgradeCard(c){
  if(!c||c.rar==='curse')return;
  if(c.special){
    switch(c.special){
      case 'soul_strike':  c.soulPct=(c.soulPct||.18)+.03; c.desc=`造成敌人当前HP的 <b>${Math.round(c.soulPct*100)}%</b> 伤害（无视格挡）`; break;
      case 'chaos_shot':   c.chaosMin=(c.chaosMin||8)+4;c.chaosMax=(c.chaosMax||45)+12; c.desc=`造成 <b>${c.chaosMin}~${c.chaosMax}</b> 随机伤害`; break;
      case 'last_stand':   c.lsDmgHigh=(c.lsDmgHigh||38)+12;c.lsDmgLow=(c.lsDmgLow||12)+4; c.desc=`HP≤30%时造成 <b>${c.lsDmgHigh}</b> 伤，否则 <b>${c.lsDmgLow}</b> 伤`; break;
      case 'martyr':       c.exhaust=false; c.desc='消耗当前HP仅剩1，造成等量无视格挡伤害'; break;
      case 'catalyze':     c.catalyzeCount=(c.catalyzeCount||1)+1; c.desc=`下 <b>${c.catalyzeCount}</b> 张牌费用归零（消耗）`; break;
      case 'phantom_hit':  c.cost=Math.max(0,c.cost-1); c.desc='造成等于当前格挡量的伤害（无视敌人格挡）'; break;
      case 'heartbreak':   c.hbDmg=(c.hbDmg||14)+8; c.desc=`清除敌人所有格挡，造成 <b>${c.hbDmg}</b> 伤害`; break;
      case 'desperation':  c.despDiv=Math.max(5,(c.despDiv||15)-5); c.desc=`获得 力量 = 缺失HP÷${c.despDiv}（最少1）（消耗）`; break;
      case 'bloodrush':    c.cost=Math.max(0,c.cost-1); c.desc='造成等于 <b>缺失HP</b> 的伤害'; break;
      case 'execute':      c.execThresh=(c.execThresh||.22)+.08;c.execDmg=(c.execDmg||16)+8; c.desc=`敌人HP＜${Math.round((c.execThresh)*100)}%时即死，否则造成 <b>${c.execDmg}</b> 伤`; break;
      case 'stagger':      c.atk=(c.atk||7)+4;c.desc=`造成 <b>${c.atk}</b> 伤害，使敌人本回合跳过行动`; break;
      case 'lockdown':     c.stunCount=(c.stunCount||1)+1;c.desc=`使敌人眩晕 <b>${c.stunCount}</b> 回合（消耗）`; break;
    }
    c.upgraded=true;c.upgradeCount=(c.upgradeCount||0)+1;
    return;
  }
  const pct=c.rar==='rare'?0.28:c.rar==='uncommon'?0.22:0.18;
  if(c.kind==='atk'&&c.atk){c.atk=Math.max(c.atk+2,Math.round(c.atk*(1+pct)));}
  else if(c.kind==='def'&&c.blk){c.blk=Math.max(c.blk+2,Math.round(c.blk*(1+pct)));}
  else if(c.kind==='skl'){
    if(c.cost>0){c.cost=Math.max(0,c.cost-1);}
    else if(c.draw){c.draw++;}
    else if(c.heal){c.heal=Math.max(c.heal+2,Math.round(c.heal*(1+pct)));}
    else if(c.poison){c.poison=Math.round(c.poison*(1+pct))+1;}
    else if(c.str){c.str++;}
  }
  c.upgraded=true;
  c.upgradeCount=(c.upgradeCount||0)+1;
}
function buildStarterDeck(){
  const pick=(pool,n)=>Array(n).fill(0).map(()=>gc(pool[0|Math.random()*pool.length]));
  const atkPicks=pick(['strike','slam','double','multishot'],3);
  const defPicks=pick(['defend','fortify','barrier','guard_quick'],3);
  const sklPicks=pick(['inspect','discard','poison_flask','weaken','meditate'],2);
  window._starterRandom={atk:atkPicks,def:defPicks,skl:sklPicks};

  genTrait(){

    const noun=this.NOUN[0|Math.random()*this.NOUN.length];
    const key=adj+noun; // 造出来的"词"，同时作为特性key和第一个候选名字
    const names=[key];const usedNoun=new Set([noun]);

    };

// 统一的"难度随楼层/地图格子等级增长"公式：所有敌人强度计算/预览都必须调用这一份，禁止再各自抄写
function calcTierScale(floor,rank){
  const fp=floor||1;const rk=rank||7;
  const rankMult=rk<=4?.85:rk<=8?1.0:rk<=12?1.15:1.30;
  const heirMult=window._heirMode?1.15:1; // 继承人模式：继承了上一位的力量，深渊也相应更警惕你
  return(1+(fp-1)*.1)*rankMult*heirMult;
}
// 敌人强度的两个核心系数：生成敌人、地图预览、战前提示、战前补强检查……所有地方都从这两个函数取数，
// 不再各写一份（以前分散抄了5处，容易改漏）。以后想整体调"战斗好不好打"，改这两个数字就够了。
// 2026-07：原来的数值太低——小怪基本1刀就死，玩家完全不用管敌人是什么、也不用管格挡，随便点都能赢，
// 这里把血量基本翻倍、每回合威胁也调高一些，让大多数战斗至少要打2~4回合，格挡/削弱/治疗才有意义。
function enemyHpFactor(isElite,isBoss){return isBoss?3.0:isElite?1.8:1.0;}
function enemyDangerPct(isElite,isBoss){return isBoss?.24:isElite?.18:.14;}
// ── 发牌系统 ──
// 敌人的"战斗力/特性"在地图生成阶段就定了（玩家在地图上看到的就是这些），
// 但具体会拿到手里的招式，要等真正进入战斗前才从这个特性认识的招式池里抽——
// 战斗力越高，能抽到的招式越多、越全；战斗力越低，招式越单一。同一种特性两次遭遇，
// 抽到的招式组合也可能不完全一样，"这只到底会用什么"直到打之前都留了一点悬念。
function dealEnemyActions(pool,dealCount){
  if(!pool||!pool.length)return[];
  if(dealCount>=pool.length)return shuf([...pool]);
  const atkIdx=pool.findIndex(a=>a.t==='a'||a.t==='execute'||a.t==='multi_a');
  const dealt=atkIdx>=0?[pool[atkIdx]]:[];
  const restPool=shuf(pool.filter((a,i)=>i!==atkIdx));
  for(const mv of restPool){if(dealt.length>=dealCount)break;dealt.push(mv);}
  return shuf(dealt);
}
function buildEnemyFromDims(card,isElite,ps){
  const {combatPower='健康',cardDmg='磨损',trait='流浪者'}=card;
  const td=TRAIT_DEFS[trait]||TRAIT_DEFS['流浪者'];
  const cs=CP_SCALE[combatPower]||CP_SCALE['健康'];
  const fp=chapter.floor||1;const rank=window._mapRank||7;
  const tierScale=calcTierScale(fp,rank);const em=window._mapEffectMult||1;
  const hp=Math.round(player.maxHp*enemyHpFactor(isElite,false)*cs.h*tierScale*(em>1&&!isElite?em:1));
  const atk=Math.round(player.maxHp*enemyDangerPct(isElite,false)*cs.a*tierScale);
  const finalAtk=Math.round(Math.max(3,atk));
  const movePool=td.acts(finalAtk);
  const baseActs=dealEnemyActions(movePool,cs.n||4);
  const cdExtra=_cdActs(cardDmg,finalAtk);
  const actions=shuf([...baseActs,...cdExtra]);
  const nm=card.enemyName||td.names[0|Math.random()*td.names.length];
  const gMin=Math.round((8+fp*5)*(isElite?2:1));
  return{name:nm,art:td.art,tier:isElite?'elite':'fight',aiType:td.aiType,
    combatPower,cardDmg,trait,traitDesc:td.desc,
    hp,atk:finalAtk,actions,block:0,str:0,poison:0,
    goldMin:gMin,goldMax:Math.round(gMin*1.6),
    escapeRound:td.escapeRound,escapeHpPct:td.escapeHpPct,returnOnKill:td.returnOnKill,destroyStolen:td.destroyStolen,lifesteal:td.lifesteal};
}

const SM={
  V:4,_slot:0,
  K(s){return`cd_save_${s!==undefined?s:this._slot}`;},
  save(slot){
    const s=slot!==undefined?slot:this._slot;
    try{
      const tit=getPlayerTitle(battle.deck);
      localStorage.setItem(this.K(s),JSON.stringify({
        v:this.V,ts:Date.now(),
        player:{...player},
        title:tit.title,titleIcon:tit.icon,
        deck:battle.deck.map(c=>({...c})),
        map:JSON.parse(JSON.stringify(mapData)),
        chapter:{...chapter,usedEnemies:[...(chapter.usedEnemies||[])]},
        rs:{...rs},
        heirMode:window._heirMode||false,heirParentTitle:window._heirParentTitle||null,
        chosenStartTitle:window._chosenStartTitle||null
      }));this._slot=s;return true;
    }catch(e){return false;}
  },
  load(slot){
    const s=slot!==undefined?slot:this._slot;
    try{
      const sv=JSON.parse(localStorage.getItem(this.K(s)));
      if(!sv||sv.v!==this.V)return false;
      this._slot=s;
      player={...sv.player};
      chapter={...sv.chapter,usedEnemies:new Set(sv.chapter.usedEnemies||[])};
      rs={...sv.rs};
      mapData=JSON.parse(JSON.stringify(sv.map));
      battle.deck=sv.deck.map(c=>({...c}));
      window._mapRank=7;
      window._heirMode=sv.heirMode||false;window._heirParentTitle=sv.heirParentTitle||null;
      window._chosenStartTitle=sv.chosenStartTitle||null;
      document.getElementById('mb').style.display='none';
      phase=PH.MAP;navClear();showView('mv');renderMap();renderHud();renderTokens();
      return true;
    }catch(e){return false;}
  },
  exists(slot){
    if(slot!==undefined)return!!localStorage.getItem(this.K(slot));
    return[0,1,2].some(s=>!!localStorage.getItem(this.K(s)));
  },
  clear(slot){
    const s=slot!==undefined?slot:this._slot;
    try{localStorage.removeItem(this.K(s));}catch(e){}
  },
  listAll(){
    return[0,1,2].map(s=>{
      const raw=localStorage.getItem(this.K(s));
      if(!raw)return{slot:s,empty:true};
      try{
        const sv=JSON.parse(raw);
        if(sv.v!==this.V)return{slot:s,empty:true};
        return{slot:s,empty:false,...sv};
      }catch(e){return{slot:s,empty:true};}
    });
  },
  auto(){if(phase!==PH.BATTLE&&phase!==PH.DEAD)this.save();}
};

// ── 卡牌动态生成器 ──
// 生成时用到的数值上限，原本是十几个分散在各条分支里的硬编码数字（48/26/14/16...），
// 现在集中放在这一张表里：以后想整体调"生成卡最强能有多强"，改这一处就够了
const CG_CAP={atk:48,def:26,defHeal:14,sklHeal:16,str:2,sklPoison:5,comboAtk:24,comboBlk:14,comboHeal:12,comboAtk2:20,comboPoison:4,comboPoison2:3,atkPoison:6};
const CardGen={
  one(ps){
    const tier=ps<30?'common':ps<60?'uncommon':'rare';
    const scale=0.7+Math.random()*0.6;
    // 硬封顶：防止高PS阶段生成远超平衡的数值
    const base=Math.max(8,Math.min(42,ps*scale*.5));
    const id='g'+Date.now().toString(36)+(Math.random()*1e6|0).toString(36);
    const r=Math.random();
    if(r<.38)return this._mkAtk(id,tier,base);
    if(r<.63)return this._mkDef(id,tier,base);
    if(r<.83)return this._mkSkl(id,tier,base);
    return this._mkCombo(id,tier,base);
  },
  _mkAtk(id,tier,base){
    const cost=base<14?0:base<28?1:2;
    const atk=Math.min(CG_CAP.atk,Math.round(base/(cost===0?1.2:cost===1?1:0.75)));
    const r=Math.random();
    if(r<.26){return{id,name:this._n('atk',tier),art:this._a('atk'),kind:'atk',rar:tier,cost,atk,desc:`造成 <b>${atk}</b> 伤害`};}
    if(r<.44){const da=Math.round(atk*.62);return{id,name:this._n('atk',tier,'d'),art:'⚡',kind:'atk',rar:tier,cost,atk:da,times:2,desc:`造成 <b>${da}</b> 伤 <b>×2</b>`};}
    if(r<.54){const ta=Math.round(atk*.42);return{id,name:this._n('atk',tier,'t'),art:'🌀',kind:'atk',rar:tier,cost:Math.min(2,cost+1),atk:ta,times:3,desc:`造成 <b>${ta}</b> 伤 <b>×3</b>`};}
    if(r<.65){const ra=Math.round(atk*.72);return{id,name:this._n('atk',tier,'s'),art:'🗡',kind:'atk',rar:tier,cost,atk:ra,draw:1,desc:`造成 <b>${ra}</b> 伤，摸 <b>1</b> 张牌`};}
    if(r<.75){const wa=Math.round(atk*.75);const wt=tier==='rare'?2:1;return{id,name:this._n('atk',tier,'w'),art:'💚',kind:'atk',rar:tier,cost,atk:wa,weak:wt,desc:`造成 <b>${wa}</b> 伤，虚弱敌人 <b>${wt}</b> 回合`};}
    if(r<.87){
      // 直伤打6折，省下的4成"预算"按 STAT_W 换算成毒层数——生成公式和 cardValue 打分公式用同一份权重表，
      // 这样这张卡的实际得分才会跟一张纯攻击牌的预算基本一致，不会凭空多出或少算数值
      const pa=Math.round(atk*.6);
      const pt=Math.min(CG_CAP.atkPoison,Math.max(1,Math.round(atk*STAT_W.atk*.4/STAT_W.poison)));
      return{id,name:this._n('atk',tier,'p'),art:'☠',kind:'atk',rar:tier,cost,atk:pa,poison:pt,desc:`造成 <b>${pa}</b> 伤，施毒 <b>${pt}</b> 层`};
    }
    const va=Math.round(atk*.65);return{id,name:this._n('atk',tier,'v'),art:'💥',kind:'atk',rar:tier,cost,atk:va,vuln:1,desc:`造成 <b>${va}</b> 伤，易伤敌人1回合`};
  },
  _mkDef(id,tier,base){
    const cost=base<11?0:base<22?1:2;
    const blk=Math.min(CG_CAP.def,Math.round(base/(cost===0?1.3:cost===1?1:0.7)));
    const r=Math.random();
    if(r<.38){return{id,name:this._n('def',tier),art:this._a('def'),kind:'def',rar:tier,cost,blk,desc:`获得 <b>${blk}</b> 格挡`};}
    if(r<.58){const bh=Math.round(blk*.72);const hl=Math.min(CG_CAP.defHeal,Math.max(2,Math.round(base*.12)));return{id,name:this._n('def',tier,'h'),art:'💊',kind:'def',rar:tier,cost,blk:bh,heal:hl,desc:`获得 <b>${bh}</b> 格挡，回复 <b>${hl}</b> HP`};}
    if(r<.75){const bd=Math.round(blk*.75);return{id,name:this._n('def',tier,'d'),art:'🔍',kind:'def',rar:tier,cost,blk:bd,draw:1,desc:`获得 <b>${bd}</b> 格挡，摸 <b>1</b> 张牌`};}
    // 格挡打65折，省下的35%预算换算成【全场】力量点数，同样用 STAT_W 反推，不再是拍脑袋的 base*.06
    const bs=Math.round(blk*.65);
    const st=Math.min(CG_CAP.str,Math.max(1,Math.round(blk*STAT_W.blk*.35/STAT_W.str)));
    return{id,name:this._n('def',tier,'q'),art:'💪',kind:'def',rar:tier,cost,blk:bs,str:st,dur:999,desc:`获得 <b>${bs}</b> 格挡，【全场】攻击 <b>+${st}</b>`};
  },
  _mkSkl(id,tier,base){
    const cost=tier==='rare'?1:Math.random()<.28?1:0;
    const r=Math.random();
    if(r<.28){const draw=1+(tier!=='common'?1:0);return{id,name:this._n('skl',tier,'dr'),art:'🔍',kind:'skl',rar:tier,cost,draw,desc:`摸 <b>${draw}</b> 张牌`};}
    if(r<.50){const heal=Math.min(CG_CAP.sklHeal,Math.round(base*.38+3));return{id,name:this._n('skl',tier,'hl'),art:'💊',kind:'skl',rar:tier,cost,heal,exhaust:true,desc:`回复 <b>${heal}</b> HP（消耗）`};}
    if(r<.68){const str=Math.min(CG_CAP.str,Math.max(1,Math.round(base*STAT_W.atk/STAT_W.str/2)));return{id,name:this._n('skl',tier,'st'),art:'💪',kind:'skl',rar:tier,cost,str,dur:999,desc:`【全场】攻击 <b>+${str}</b>`};}
    if(r<.83){const poi=Math.min(CG_CAP.sklPoison,Math.max(1,Math.round(base*STAT_W.atk/STAT_W.poison/2)));return{id,name:this._n('skl',tier,'po'),art:'☠',kind:'skl',rar:tier,cost,poison:poi,desc:`施毒 <b>${poi}</b> 层`};}
    const draw2=1+(tier==='rare'?1:0);const str2=1;return{id,name:this._n('skl',tier,'ds'),art:'✨',kind:'skl',rar:tier,cost,draw:draw2,str:str2,dur:999,desc:`摸 <b>${draw2}</b> 张牌，【全场】攻击 <b>+${str2}</b>`};
  },
  _mkCombo(id,tier,base){
    const cost=1;const r=Math.random();

function cardFromMove(move,tier){

    case 'multi_a':{const atk=Math.max(2,Math.round(move.v*.8));const times=move.hits||2;return{...base,art:'🌀',kind:'atk',cost:2,atk,times,desc:`造成 <b>${atk}</b> 伤 <b>×${times}</b>`};}
    case 'execute':{const dmg=Math.max(8,Math.round(move.v*.5));const thresh=Math.min(.4,move.thresh||.3);return{...base,art:'⚰',kind:'atk',cost:2,special:'execute',execThresh:thresh,execDmg:dmg,desc:`敌人HP＜${Math.round(thresh*100)}%时即死，否则造成 <b>${dmg}</b> 伤`};}
    case 'd':{const blk=Math.max(4,Math.round(move.v*1.1));return{...base,art:'🛡',kind:'def',cost:blk<9?0:blk<18?1:2,blk,desc:`获得 <b>${blk}</b> 格挡`};}
    case 'h':{const heal=Math.max(4,Math.round(move.v*.9));return{...base,art:'💊',kind:'skl',cost:1,heal,exhaust:true,desc:`立即恢复 <b>${heal}</b> HP（消耗）`};}
    case 's':{const str=Math.max(1,Math.min(3,move.v||1));return{...base,art:'💪',kind:'skl',cost:1,str,dur:999,desc:`【全场】攻击 <b>+${str}</b>`};}
    case 'p':{const poison=Math.max(2,move.v||3);const atk=Math.max(3,Math.round(poison*STAT_W.poison/STAT_W.atk));return{...base,art:'☠',kind:'atk',cost:1,atk,poison,desc:`造成 <b>${atk}</b> 伤，施加 <b>${poison}</b> 层中毒`};}
    case 'w':{const weak=Math.max(1,move.v||1);const atk=6;return{...base,art:'💚',kind:'atk',cost:1,atk,weak,desc:`造成 <b>${atk}</b> 伤，敌人虚弱 <b>${weak}</b> 回合`};}
    case 'z':case 'x':case 'drain_ap':return{...base,art:'💫',kind:'atk',cost:1,atk:7,special:'stagger',stunCount:1,desc:'造成 <b>7</b> 伤，使敌人本回合跳过行动'};

    case 'drain_maxhp':{const heal=Math.max(6,Math.round((move.pct||.03)*300));return{...base,art:'🧛',kind:'def',cost:1,blk:6,heal,desc:`获得 <b>6</b> 格挡，恢复 <b>${heal}</b> HP`};}
    case 'steal':case 'wear_card':case 'exile_card':case 'burn_card':case 'mutate_card':
    default:return{...base,art:'🔍',kind:'skl',cost:0,special:'discard',desc:'弃最贵的牌，摸 2 张'};
  }
}

function calcPS(){
  const ds=battle.deck.reduce((s,c)=>{if(!c)return s;const w={common:1,uncommon:2,rare:4,curse:-1};return s+(w[c.rar]||1)+(cardValue(c)||0)*.05;},0);
  return Math.round(ds+(player.maxHp/50)*20+chapter.floor*8+player.kills*2+Math.floor(player.gold/20));
}
function buildEnemy(tmpl,isElite,isBoss){
  const fp=chapter.floor;
  const rank=window._mapRank||7;
  const tierScale=calcTierScale(fp,rank);
  const effectMult=window._mapEffectMult||1;
  // HP: tier base × normalized hpMult (each tier's avg hpMult treated as 1.0)
  const hpBase=player.maxHp*enemyHpFactor(isElite,isBoss);
  const hpNorm=isBoss?3.0:isElite?1.6:1.0;
  const hp=Math.round(hpBase*(tmpl.hpMult/hpNorm)*tierScale*(effectMult>1&&!isBoss?effectMult:1));
  // Target attack per turn: % of player maxHP (keeps fights fair)
  const dangerPct=enemyDangerPct(isElite,isBoss);
  const targetAtkPerTurn=Math.round(player.maxHp*dangerPct*tierScale);
  // Scale action values so average damage output ≈ targetAtkPerTurn
  const tmplActions=tmpl.actions||[];
  const tmplAtkActions=tmplActions.filter(a=>a.t==='a');
  const avgTmplAtk=tmplAtkActions.length>0?tmplAtkActions.reduce((s,a)=>s+a.v,0)/tmplAtkActions.length:8;
  const attackFreq=tmplAtkActions.length/Math.max(tmplActions.length,1);
  const atkScale=targetAtkPerTurn/Math.max(avgTmplAtk*attackFreq,3);
  const actions=tmplActions.map(a=>({...a,
    v:a.t==='a'?Math.round(Math.max(3,a.v*atkScale)):
      a.t==='d'?Math.round(Math.max(2,a.v*atkScale*.4)):a.v}));
  const gMin=Math.round((8+fp*5)*(isBoss?3:isElite?2:1));
  const e={...tmpl,hp,atk:targetAtkPerTurn,actions,block:0,str:0,poison:tmpl.poison||0,goldMin:gMin,goldMax:Math.round(gMin*1.5)};
  if(chapter.modifier?.apply)chapter.modifier.apply(e,calcPS());
  return e;
}
function generateChapter(){
  const theme=THEMES[0|Math.random()*THEMES.length];
  const mod=MODS[0|Math.random()*MODS.length];
  const bossTmpls=shuf(ET.filter(e=>e.tier==='boss'));
  const boss=bossTmpls[0];
  const boss2=bossTmpls[1]||bossTmpls[0];
  chapter.theme=theme;chapter.modifier=mod;chapter.boss=boss;chapter.boss2=boss2;
  chapter.usedEnemies=new Set();
  return{theme,mod,boss,boss2,ps:calcPS(),floor:chapter.floor};
}

function toR(n){return['I','II','III','IV','V','VI','VII','VIII','IX','X'][n-1]||n;}
function selectMapCard(ci){window._mapPending=ci;renderMap();}
function pickMapCard(col){
  if(phase!==PH.MAP)return; // 只在地图阶段允许操作，防止重复触发
  window._mapPending=null;
  const{rows,step,playerCol}=mapData;
  if(step>18||!rows[step])return;
  let reach;
  if(step===18){reach=bossRowReach(playerCol,MAP_COLS,4);}
  else{reach=new Set([playerCol-1,playerCol,playerCol+1].filter(c=>c>=0&&c<MAP_COLS));}
  if(!reach.has(col))return;
  const card=rows[step][col];if(!card)return;

  const wasBlind=card.isHidden&&!card.revealed;
  card.revealed=true;
  // Boss variant determines its own power mult; non-boss blinds get ×2
  const bv=card.bossVariant||null;
  if(card.type==='boss'){
    // Store which boss and power multiplier
    window._bossPowerMult= bv==='easy'?.5:bv==='hard'?2.0:bv==='major'?1.2:0.85;
    window._bossRef=card.bossRef||(bv==='minor'?chapter.boss2:chapter.boss)||chapter.boss;
    window._mapEffectMult=1;
    const revealMsg=wasBlind?(bv==='easy'?'🎴 镜影现形！弱化Boss出现！':bv==='hard'?'☠ 深渊具现！超强Boss降临！':bv==='curse'?'☠ 诅咒化身现身！':'● 财富守护者登场！双倍金币！'):'';
    if(revealMsg)toast(revealMsg,'r');
  }else{
    window._bossPowerMult=1;window._bossRef=null;
    window._mapEffectMult=wasBlind?2:1;
    if(wasBlind)toast('🎴 暗牌揭晓！效果 ×2');
  }

  window._mapRank=card.rank||7;
  window._bossVariant=bv;

  mapData.history.push({...card,isHidden:wasBlind});
  mapData.playerCol=col;
  mapData.step=step+1;
  player.steps=(player.steps||0)+1;

  // 存储地图卡供战斗生成用
  window._mapCard=card._hasDims?card:null;
  switch(card.type){
    case 'fight':     startBattle(false,false);break;
    case 'elite':     startBattle(true,false);break;
    case 'boss':      showPreBattle(false,true);break;
    case 'event':     startEvent();break;
    case 'tavern':    startTavern();break;
    case 'campfire':  startCampfire();break;
    case 'blacksmith':startBlacksmith();break;
    case 'gamble':      startGamble();break;
    case 'altar':       startAltar();break;
    case 'blackmarket': startBlackMarket();break;
    case 'chest':       startChest(card);break;
  }
  if(phase===PH.MAP)renderMap();
  // 每步地图自动存档
  SM.auto();
}

function getBattleRating(isElite,isBoss){
  if(isBoss)return{label:'首领',color:'var(--violet)',icon:'☠',desc:'章节最终守卫，实力未知，全力迎战',tier:'boss'};
  if(isElite)return{label:'精英',color:'var(--amber)',icon:'✦',desc:'强大的精英敌人，掉落优质战利品',tier:'elite'};
  const rank=window._mapRank||7;const floor=chapter.floor||1;const em=window._mapEffectMult||1;
  const danger=(rank/7)*(1+(floor-1)*.2)*em;
  if(danger<0.65)return{label:'弱鸡',color:'var(--slime)',icon:'🟢',desc:'不堪一击，速速了结',tier:'fight'};
  if(danger<0.95)return{label:'普通',color:'var(--text)',icon:'⚔',desc:'标准战斗，保持戒备',tier:'fight'};
  if(danger<1.25)return{label:'强敌',color:'var(--gore2)',icon:'🔴',desc:'不可小觑，仔细规划出牌',tier:'fight'};
  return{label:'险境',color:'var(--blood)',icon:'☠',desc:'高度危险，生命可能不保',tier:'fight'};
}

    <div><div style="font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:4px">每回合伤害</div><div style="font-size:14px;color:var(--amber);font-weight:700">${Math.round(estAtk*.8)}~${Math.round(estAtk*1.2)}</div></div>

// 战前强度评估：预生成敌人若相对当前玩家明显太弱，自动增援

function _enemyPickAction(){
  const acts=battle.enemyActions||[];if(!acts.length)return null;
  const ai=battle.enemy?.aiType||'power';
  const isAtkType=t=>t==='a'||t==='execute'||t==='multi_a';

    if(ai==='aggro')return isAtkType(a.t)?(a.v||8)*2.2:0.3;
    if(ai==='power')return a.t==='a'?(a.v||8)*1.3:a.t==='d'?0.8:1.0;

          if(c.atk&&c.atk>1)c.atk=Math.max(1,c.atk-Math.ceil(c.atk*.15));
          if(c.blk&&c.blk>1)c.blk=Math.max(1,c.blk-Math.ceil(c.blk*.15));

function endBattle(won){
  stopBGM();
  if(won){
    sfx(440,.1,'square',.1,220);setTimeout(()=>sfx(660,.2,'square',.1,110),120);
    // 击杀小偷后找回被偷的牌，重新放回持久牌组（强盗偷的已永久销毁，不找回）
    if(battle.stolenCards?.length&&battle.enemy?.trait==='小偷'){
      battle.stolenCards.forEach(c=>{battle.discardPile.push(c);battle.deck.push(c);});
      toast(`🎭 击杀小偷！夺回 ${battle.stolenCards.length} 张被偷的牌！`,'g');
      battle.stolenCards=[];
    }
    // 战斗结束，归还封印牌
    if(battle.exiledCards?.length){battle.exiledCards.forEach(c=>battle.discardPile.push(c));}
    player.kills++;
    const kt=battle.enemy?.trait;
    if(kt){if(!rs.killsByTrait)rs.killsByTrait={};rs.killsByTrait[kt]=(rs.killsByTrait[kt]||0)+1;}
    const em=window._mapEffectMult||1;
    const gm=(chapter.modifier?.goldMult||1)*em;
    const g=Math.round((battle.enemy.goldMin+Math.random()*(battle.enemy.goldMax-battle.enemy.goldMin))*gm);
    player.gold+=g;
    if(battle.enemy.tier==='boss'){
      rs.chaptersCleared++;
      // "财富守护"暗牌变体：之前只在地图上承诺"高额金币奖励"，却从没真正给过金币，这里补上双倍金币
      const bGold=Math.floor(50*chapter.floor*(window._bossVariant==='gold'?2:1));
      player.gold+=bGold;
      // Curse variant: add a curse card as penalty
      if(window._pendingCurse){battle.deck.push(gc('regret'));toast(`☠ 诅咒化身！首领已倒但获得了诅咒牌！+${bGold}金币`,'r');}
      else if(window._bossVariant==='gold')toast(`● 财富守护！首领已倒，双倍金币 +${bGold}！`,'g');
      else toast(`首领已倒！+${bGold}金币`,'g');
      window._pendingCurse=false;
      setTimeout(()=>showBossReward(),1000);
    }
    else{showReward(g);SM.auto();}
  }else{sfx(80,.4,'sawtooth',.15,-30);showGameOver();SM.clear();}
}

function showReward(gold){
  phase=PH.OV;
  const ps=calcPS();
  const enemy=battle.enemy||{tier:'fight',art:'✦',name:'奖励'};
  const tier=enemy.tier;
  const isElite=tier==='elite',isBoss=tier==='boss';
  const vidx=enemyValIdx(enemy);
  const tierRareBoost=[0,.08,.18,.32,.5][vidx];
  // rc/uc/fillPool 仅用于事件强制奖励和"敌人招式不够3种"时的兜底填充，不再是主要卡池来源
  const rc=Math.min(.6,ps/130+tierRareBoost);const uc=Math.min(.7,.25+ps/110+tierRareBoost*.6);
  const fillPool=DB.filter(c=>c.rar!=='curse');
  // Analyze deck composition to bias rewards toward what player needs
  const deckKinds={atk:0,def:0,skl:0};
  battle.deck.forEach(c=>{if(deckKinds[c.kind]!==undefined)deckKinds[c.kind]++;});
  const deckTotal=Object.values(deckKinds).reduce((s,v)=>s+v,1);
  const atkRat=deckKinds.atk/deckTotal,defRat=deckKinds.def/deckTotal,sklRat=deckKinds.skl/deckTotal;
  const hpPct2=player.hp/player.maxHp;
  // Kind weight: boost underrepresented types; boost def if low HP
  function kindW(c){
    if(c.kind==='atk'){return atkRat>.6?.6:atkRat<.25?1.6:1.0;}
    if(c.kind==='def'){const hpBonus=hpPct2<.4?1.8:hpPct2<.6?1.3:1.0;return defRat>.55?.5*hpBonus:defRat<.2?1.5*hpBonus:1.0*hpBonus;}
    if(c.kind==='skl'){return sklRat>.5?.7:sklRat<.15?1.5:1.0;}
    return 1;
  }
  function randCard(ex){const av=fillPool.filter(c=>!ex.has(c.id));const w=av.map(c=>(c.rar==='rare'?rc*3:c.rar==='uncommon'?uc*2:1)*kindW(c));const tot=w.reduce((s,x)=>s+x,0);let r=Math.random()*tot;for(let i=0;i<av.length;i++){r-=w[i];if(r<=0)return av[i];}return av[av.length-1];}
  const forceRare=window._eventRareCount||0;window._eventRareCount=0;
  if(forceRare>=2){
    // 明确数量的固定奖励（如"获得2张稀有卡"）：直接全部发放，不能再做"三选一"——
    // 否则承诺2张实际只能拿到1张，是个真实存在的bug
    const rarePool=DB.filter(c=>c.rar==='rare');
    const usedR=new Set();const granted=[];
    shuf(rarePool).forEach(c=>{if(granted.length<forceRare&&!usedR.has(c.id)){granted.push(c);usedR.add(c.id);}});
    while(granted.length<forceRare){const c=randCard(usedR);if(!c)break;granted.push(c);usedR.add(c.id);}
    granted.forEach(c=>battle.deck.push({...c}));
    document.getElementById('ovtag').textContent='✦  事件奖励';
    document.getElementById('ovtit').textContent='满载而归';
    setSceneArt('🎁',`命运眷顾，你直接获得了 ${granted.length} 张稀有卡牌！`);
    const cardsHtml=granted.map((c,i)=>renderPokerCard(c,null,{idx:i,total:granted.length})).join('');
    document.getElementById('ovb').innerHTML=`<div class="ovd" style="color:var(--amber)">🎉 获得以下 ${granted.length} 张牌：</div>
      <div class="tcards-table">${cardsHtml}</div>
      <button class="ovbtn gd" style="margin-top:8px" onclick="backToMap()">✓ 收下，继续</button>`;
    showView('ov');renderHud();renderTokens();
    return;
  }
  let picked=[];const used=new Set();
  if(forceRare>0){
    const rarePool=DB.filter(c=>c.rar==='rare');
    shuf(rarePool).slice(0,forceRare).forEach(c=>{picked.push(c);used.add(c.id);});
    while(picked.length<3){const c=randCard(used);if(!c)break;picked.push(c);used.add(c.id);}
  }else{
    // 没有专属于玩家的"战利品清单"——直接把刚打赢的这个敌人自己用过的招式，转换成玩家能用的卡牌。
    // 敌人和玩家本质上是同一套"角色属性"系统的产物，敌人用什么打你，你赢了就学会同一招反过来用。
    const srcActions=(battle.enemy?.actions||[]).filter(a=>a&&a.t);
    const seenT=new Set();
    shuf(srcActions).forEach(mv=>{
      if(picked.length>=3||seenT.has(mv.t))return;
      seenT.add(mv.t);
      const c=cardFromMove(mv,tier);
      if(!used.has(c.id)){picked.push(c);used.add(c.id);}
    });
    // 极少数情况敌人招式种类不够3种：用商人/事件那套独立体系（CardGen）补足，不影响主流程
    if(picked.length<3){const genCard=CardGen.one(ps+vidx*8);if(!used.has(genCard.id)){picked.push(genCard);used.add(genCard.id);}}
    while(picked.length<3){const c=randCard(used);if(!c)break;picked.push(c);used.add(c.id);}
  }
  picked=picked.slice(0,3);// 兜底：奖励一次最多只给3张
  window._rw=shuf(picked);window._rwSel=null;window._rwGold=gold;window._rwLabel=isBoss?`☠ 击败 ${enemy.name}`:isElite?`✦ 掠夺 ${enemy.name}`:forceRare?'✦ 事件奖励':'⚔ 战斗奖励';window._rwBoss=isBoss;window._rwElite=isElite;window._rwForce=forceRare;window._rwEnemy=enemy.name;
  document.getElementById('ovtag').textContent=isBoss?'☠  战利品':isElite?'✦  精英战利品':'⚔  战斗奖励';
  document.getElementById('ovtit').textContent='选择奖励';
  const rwArt=isBoss?'🏆':isElite?'💎':'🎴';
  const rwStory=isBoss?`击败了 ${enemy.name}，胜利的滋味令人振奋——选择你最需要的力量。`:isElite?`强敌落败。从它的遗物中选择一张卡牌。`:gold>0?`战斗结束，${gold}枚金币散落一地。选一张牌带走。`:'战斗结束。选一张牌吧。';
  setSceneArt(rwArt,rwStory);
  showView('ov');renderHud();renderTokens();
  renderRewardUI();
}

function genTavernCards(){
  const disc=(chapter.modifier?.shopDiscount||1)/(window._mapEffectMult||1);
  const ps=calcPS();
  // Weighted random card pool: higher ps = more rare/uncommon
  const rc=Math.min(.45,ps/150);const uc=Math.min(.6,.2+ps/120);
  const pool=DB.filter(c=>c.rar!=='curse');
  const used=new Set(battle.deck.map(c=>c.id));
  function weightedPick(){const av=pool.filter(c=>!used.has(c.id));if(!av.length)return null;const w=av.map(c=>c.rar==='rare'?rc*4:c.rar==='uncommon'?uc*2.5:1);const tot=w.reduce((s,x)=>s+x,0);let r=Math.random()*tot;for(let i=0;i<av.length;i++){r-=w[i];if(r<=0){used.add(av[i].id);return av[i];}}const c=av[av.length-1];used.add(c.id);return c;}
  const priceOf=c=>c.rar==='rare'?Math.round(105*disc):c.rar==='uncommon'?Math.round(65*disc):Math.round(38*disc);
  const cards=[];for(let i=0;i<4;i++){const c=weightedPick();if(c)cards.push({card:c,price:priceOf(c)});}
  return cards;
}

function renderHand(){
  const b=battle;
  const selectedSet=new Set(b.selectedCards||[]);
  document.getElementById('hcs').innerHTML=b.hand.map((c,i)=>{
    const sel=selectedSet.has(i);
    const unplay=b.playerStun>0||(b.playerDisarm>0&&c.kind==='atk')||b.apLeft<c.cost||c.unplayable;
    const cc=c.cost===0?'c0':c.cost===2?'c2':c.cost>=3?'c3':'';
    const kc=c.kind==='atk'?'atk':c.kind==='def'?'def':c.kind==='skl'?'skl':'crs';
    let actualAtk=null;
    if(c.kind==='atk'&&c.atk){
      let a=c.apscale?c.atk*(b.apLeft+c.cost):(c.atk+(b.str||0));
      if(b.playerWeak>0)a=Math.floor(a*.75);
      if(a!==c.atk)actualAtk=Math.max(0,a);
    }
    let d=(c.desc||'');
    if(actualAtk!==null)d=d.replace('{atk}',`${c.atk}<span class="abuf">→${actualAtk}</span>`);
    else d=d.replace('{atk}',c.atk||0);
    d=d.replace('{blk}',c.blk||0).replace('{heal}',c.heal||0).replace('{str}',c.str||0);
    const kn=c.kind==='atk'?'攻击':c.kind==='def'?'防御':c.kind==='skl'?'技能':'诅咒';
    const rc2=c.rar==='common'?'rc':c.rar==='uncommon'?'ru':c.rar==='rare'?'rr':'rcu';
    const rarBadge=c.rar==='rare'?`<div class="hcrb rr">◆</div>`:c.rar==='uncommon'?`<div class="hcrb ru">◇</div>`:c.rar==='curse'?`<div class="hcrb rcu">☠</div>`:`<div class="hcrb rc">○</div>`;
    const val=cardValue(c);const valBadge=val>0?`<div class="hcv">${val}g</div>`:'';
    const upgBadge=c.upgradeCount?`<div class="hcup">+${c.upgradeCount}</div>`:'';
    return`<div class="hc ${kc}${sel?' sel':''}${unplay?' unp':''}" onclick="selectCard(${i})"><div class="hcc ${cc}">${c.cost}</div><div class="hca">${c.art}</div><div class="hcb"><div class="hcn">${c.name}${upgBadge}</div><div class="hct">${kn}${c.dur?'·全场':''}</div><div class="hcd">${d}</div><div class="hcr ${rc2}"></div></div>${rarBadge}${valBadge}</div>`;
  }).join('');
  updatePlayButton();
}

function _bmMakeLot(ps){
  const isScam=Math.random()<.35;
  const rarPick=()=>{const r=Math.random();return r<.3?'rare':r<.7?'uncommon':'common';};
  // 真实牌
  let realCard;
  if(isScam){const scamIds=['regret','pain'];realCard=gc(scamIds[0|Math.random()*scamIds.length]);}
  else{const rar=rarPick();const pool=DB.filter(c=>c.rar===rar&&c.kind!=='crs');realCard=pool[0|Math.random()*pool.length]||DB[0];}
  // 表面描述（骗局时用好听词，真实时略夸大）
  const kinds={atk:'攻击',def:'防御',skl:'技能'};
  const rars={common:'普通',uncommon:'罕见',rare:'稀有'};
  let fakeKind,fakeRar,fakeName,fakeDesc;
  if(isScam){
    fakeKind=['atk','def','skl'][0|Math.random()*3];
    fakeRar=['uncommon','rare'][0|Math.random()*2];
    const fakeDescs=['能在紧要关头扭转局势','据说是失传的古老技艺','战场上极为罕见的手法','能给敌人带来麻烦的好牌'];
    fakeDesc=fakeDescs[0|Math.random()*fakeDescs.length];
    fakeName=['神秘技法','暗夜秘术','古老秘籍','失传战技'][0|Math.random()*4];
  }else{
    fakeKind=realCard.kind==='crs'?'skl':realCard.kind;
    fakeRar=realCard.rar==='curse'?'uncommon':realCard.rar;
    fakeName=realCard.name;
    const adjectives=['相当实用的','颇具威力的','颇受好评的','稳定输出的','出奇制胜的'];
    fakeDesc=`${adjectives[0|Math.random()*adjectives.length]}${kinds[fakeKind]||''}牌`;
  }
  const basePrice={common:30,uncommon:55,rare:90,curse:0}[fakeRar]||40;
  const price=Math.round(basePrice*(1+ps/150)*(0.9+Math.random()*.25));
  return{realCard,isScam,fakeKind,fakeRar,fakeName,fakeDesc,price};
}

function startFusion(){window._fusionSel=[];renderFusionUI();}
// 稳定性→熔合倍率区间：预览文字和实际结算必须用同一份阈值/区间，不然玩家看到的"预估"和真正掷出来的对不上
function fusionModRange(stab){
  if(stab>.8)return{min:.75,max:1.4};
  if(stab>.5)return{min:.5,max:1.8};
  return{min:-.3,max:3.0};
}
function renderFusionUI(){
  const sel=window._fusionSel||[];
  const kn=k=>k==='atk'?'攻击':k==='def'?'防御':k==='skl'?'技能':'诅咒';
  const validCards=battle.deck.filter(c=>c.rar!=='curse');
  let h=`<div class="ovd">选择 2-5 张牌熔合。同名牌稳定，差异大则充满变数（可能产生废牌）。</div>`;
  h+=`<div style="font-size:10px;color:var(--text2);margin-bottom:8px">已选 ${sel.length}/5：`;
  if(sel.length)h+=sel.map(i=>`<span style="color:var(--amber);margin:0 3px">${battle.deck[i]?.name||'?'}</span>`).join('+');
  else h+='（无）';
  h+='</div>';
  if(sel.length>=2){
    const sc=sel.map(i=>battle.deck[i]);const vals=sc.map(c=>cardValue(c));
    const totalV=vals.reduce((s,v)=>s+v,0),avgV=totalV/sc.length;
    const nameDivers=new Set(sc.map(c=>c.name)).size/sc.length;
    const kindDivers=new Set(sc.map(c=>c.kind)).size/sc.length;
    const stab=Math.max(0,1-nameDivers*.7-kindDivers*.3);
    const{min:_mn,max:_mx}=fusionModRange(stab);
    const minR=Math.round(totalV*.7*_mn),maxR=Math.round(totalV*.7*_mx);
    h+=`<div style="margin:0 0 8px;padding:5px 10px;border:1px solid var(--crack2);font-size:9px;color:var(--text2)">稳定性 ${Math.round(stab*100)}% · 总价值 ${totalV}g · 预估 ${minR}~${maxR}g</div>`;
  }
  validCards.forEach((c,ci)=>{
    const ri=battle.deck.indexOf(c);const isSel=sel.includes(ri);
    const d=(c.desc||'').replace('{atk}',c.atk||0).replace('{blk}',c.blk||0).replace('{heal}',c.heal||0).replace('{str}',c.str||0);
    const val=cardValue(c);
    h+=`<div class="rw${isSel?' rw-sel':''}" onclick="toggleFusion(${ri})" style="${isSel?'border-color:var(--violet);background:rgba(106,58,154,.15)':''}">
      <div class="rwa">${c.art}</div><div class="rwi"><div class="rwn">${c.name} ${c.upgradeCount?`<span style="color:var(--slime);font-size:9px;font-weight:700">+${c.upgradeCount}</span>`:''} <span style="color:var(--amber);font-size:8px">≈${val}g</span></div>
      <div class="rwd"><span style="color:var(--text3)">${kn(c.kind)} ◆${c.cost}</span> · ${d}</div></div>
      ${isSel?'<span style="color:var(--violet);font-size:13px;flex-shrink:0">✓</span>':''}
    </div>`;
  });
  h+=`<div style="display:flex;gap:8px;margin-top:10px">
    <button class="ovbtn" style="flex:1;margin:0" onclick="executeFusion()" ${sel.length<2?'disabled':''}>🔮 熔合 (${sel.length}张)</button>
    <button class="ovbtn" style="flex:1;margin:0" onclick="renderBlacksmithMain()">取消</button>
  </div>`;
  document.getElementById('ovb').innerHTML=h;
}
function toggleFusion(ri){
  const sel=window._fusionSel||[];const i=sel.indexOf(ri);
  if(i>=0)window._fusionSel=sel.filter(x=>x!==ri);
  else if(sel.length<5)window._fusionSel=[...sel,ri];
  else{toast('最多选5张','r');return;}
  renderFusionUI();
}
function executeFusion(){
  const sel=window._fusionSel||[];if(sel.length<2){toast('至少选2张','r');return;}
  const sc=sel.map(i=>battle.deck[i]);
  const vals=sc.map(c=>cardValue(c));const totalV=vals.reduce((s,v)=>s+v,0);
  const nameDivers=new Set(sc.map(c=>c.name)).size/sc.length;
  const kindDivers=new Set(sc.map(c=>c.kind)).size/sc.length;
  const stab=Math.max(0,1-nameDivers*.7-kindDivers*.3);
  const roll=Math.random();
  const{min:_mn2,max:_mx2}=fusionModRange(stab);
  const mod=_mn2+roll*(_mx2-_mn2);
  const targetV=Math.round(totalV*.7*mod);
  // Remove selected cards
  [...sel].sort((a,b)=>b-a).forEach(i=>battle.deck.splice(i,1));
  window._fusionSel=[];
  if(targetV<=0){
    const waste={id:'fusewaste_'+Date.now(),name:'熔合废品',art:'💔',kind:'crs',rar:'curse',cost:0,desc:'占用手牌，回合结束损失1HP',curseTick:1,unplayable:true};
    battle.deck.push(waste);toast('熔合失败！产生了废牌','r');
  }else{
    const result=buildFusionCard(sc,targetV);battle.deck.push(result);
    const grade=mod>=2?'⚡ 神铸':mod>=1.3?'✓ 精良':mod<0.5?'⚠ 粗糙':'普通';
    toast(`熔合${grade}：${result.name} ≈${targetV}g`,mod>=1?'g':'');
  }
  setTimeout(backToMap,600);
}
function buildFusionCard(sources,val){
  const kindC={};sources.forEach(c=>{kindC[c.kind]=(kindC[c.kind]||0)+1;});
  const domKind=Object.entries(kindC).sort((a,b)=>b[1]-a[1])[0][0];
  const rar=val>=65?'rare':val>=35?'uncommon':'common';
  const artMap={atk:['⚔','🗡','💢'],def:['🛡','🌊','🏰'],skl:['✨','💎','🔮']};
  const art=(artMap[domKind]||['⚡'])[Math.floor(Math.random()*(artMap[domKind]||['⚡']).length)];
  const rarPfx=rar==='rare'?'神':rar==='uncommon'?'精':'';
  const nm=`${rarPfx}熔合·${domKind==='atk'?'剑':domKind==='def'?'盾':'法'}`;
  let r={id:'fus_'+Date.now(),name:nm,art,rar,kind:domKind,desc:'',cost:0,upgraded:false};
  if(domKind==='atk'){r.cost=val<22?0:val<50?1:2;r.atk=Math.round(val/(r.cost===0?1.4:r.cost===1?1:0.8)/2);r.desc=`造成 <b>${r.atk}</b> 伤害`;}
  else if(domKind==='def'){r.cost=val<18?0:val<42?1:2;r.blk=Math.round(val/(r.cost===0?1.4:r.cost===1?1:0.8)/1.5);r.desc=`获得 <b>${r.blk}</b> 格挡`;}
  else{
    const hasDur=sources.some(c=>c.dur);const hasHeal=sources.some(c=>c.heal);const hasPoison=sources.some(c=>c.poison);
    r.cost=val<22?0:val<50?1:2;
    if(hasDur&&val>=35){r.str=Math.max(1,Math.round(val/8));r.dur=999;r.desc=`【全场】攻击 <b>+${r.str}</b>`;}
    else if(hasPoison){r.poison=Math.max(2,Math.round(val/5));r.desc=`施加 <b>${r.poison}</b> 层中毒`;}
    else if(hasHeal){r.heal=Math.max(3,Math.round(val/1.5));r.exhaust=true;r.desc=`回复 <b>${r.heal}</b> HP（消耗）`;}
    else{r.draw=Math.max(1,Math.round(val/7));r.desc=`摸 <b>${r.draw}</b> 张牌`;}
  }
  return r;
}

let _ac=null;
function ac(){if(!_ac){try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return _ac;}
function sfx(freq,dur,type='square',vol=0.12,sweep=0){
  try{
    const ctx=ac();if(!ctx)return;
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);
    if(sweep)o.frequency.linearRampToValueAtTime(freq+sweep,ctx.currentTime+dur*.7);
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+dur+.05);
  }catch(e){}
}

  const lineEl=document.createElement('div');lineEl.className='cs-line';
  lineEl.innerHTML='';linesEl.appendChild(lineEl);
  const rawHtml=_csLines[_csLI];_csLI++;_csCI=0;
  csTypeHtml(lineEl,rawHtml,()=>{lineEl.classList.add('vis');setTimeout(()=>csNextLine(),700);});
}
function csTypeHtml(el,html,done){
  // Strip tags for typing, restore them at end for simplicity
  el.innerHTML=html+'<span class="cs-cursor"></span>';el.classList.add('vis');
  // Actually reveal char by char by building up innerHTML
  el.innerHTML='<span class="cs-cursor"></span>';
  el.classList.add('vis');
  const plain=html.replace(/<[^>]*>/g,'');const totalChars=plain.length;let typed=0;
  const stripped=html;let result='';let tagBuffer='';let inTag=false;let charIdx=0;
  const source=[...stripped];
  function step(){
    if(charIdx>=source.length){el.innerHTML=stripped;done?.();return;}
    const ch=source[charIdx];charIdx++;
    if(ch==='<'){inTag=true;tagBuffer='<';}
    else if(inTag){tagBuffer+=ch;if(ch==='>'){inTag=false;result+=tagBuffer;tagBuffer='';}}
    else{result+=ch;typed++;}
    el.innerHTML=result+'<span class="cs-cursor"></span>';
    const delay=typed<totalChars*.3?38:typed<totalChars*.7?32:42;
    _csTimer=setTimeout(step,delay);
  }
  step();
}
function csFinishAll(){
  _csDone=true;
  const linesEl=document.getElementById('cs-lines');
  linesEl.querySelectorAll('.cs-line').forEach(el=>el.classList.add('vis'));
  document.getElementById('cs-cont').style.display='inline-block';
}
function skipCutscene(){
  clearTimeout(_csTimer);
  const linesEl=document.getElementById('cs-lines');
  linesEl.innerHTML=_csLines.map(l=>`<div class="cs-line vis">${l}</div>`).join('');
  document.getElementById('cs-cont').style.display='inline-block';
}
function finishCutscene(){
  clearTimeout(_csTimer);
  document.getElementById('cutscene').style.display='none';
  _csOnComplete?.();_csOnComplete=null;
}
function initGame(){
  stopBGM();navClear();
  player={hp:50,maxHp:50,gold:80,floor:1,kills:0,steps:0,drawCount:5,maxAp:3};
  chapter={floor:1,theme:null,modifier:null,boss:null};
  const startDeck=buildStarterDeck();
  window._playerSeed=null;window._playerAppear=null;
  battle={enemy:null,enemyHp:0,enemyMaxHp:0,enemyBlk:0,enemyStr:0,enemyWeak:0,enemyVuln:0,enemyPoison:0,enemyBleed:0,enemyStun:0,enemyActions:[],enemyActionIdx:0,nextEnemyAction:null,deck:startDeck,drawPile:[],hand:[],discardPile:[],exhPile:[],apLeft:3,maxAp:3,blk:0,str:0,jugg:false,lifestealMode:false,playerPoison:0,playerWeak:0,playerStun:0,playerDisarm:0,fortified:0,turn:1,selectedCards:[],firstCard:true,nextFreeCount:0};
  rs={dmgDealt:0,dmgTaken:0,cardsPlayed:0,turns:0,chaptersCleared:0,killsByTrait:{}};
  window._mapRank=7;
  window._lastShownTitle=null;
  window._heirMode=false;window._heirParentTitle=null;
  window._chosenStartTitle=null;
  document.getElementById('mb').style.display='none';
  showRunStart();
}
// ── 开局称号选择：没有固定角色，但可以在这里挑一个"称号"来定这一局的调子——
// 称号就是游戏里本来就有的那套称号（击杀构筑够久也会自然算出同一个），选了就直接获得对应的2张标志性卡牌，
// 第1章会先显示这个称号，之后牌组真正长成什么样，称号也会自然跟着演变，不会一直锁死。
// 如果上一局死亡时选择了传承，这里还会多一个"成为XX的继承者"选项——继承卡包+称号，但本局难度会提高
const _STARTER_TITLES=[
  {title:'嗜血的残忍斗士',icon:'⚔',color:'var(--gore2)',desc:'为了更快更痛的胜利',cards:['berserker','chain_slash']},
  {title:'坚不可摧的铁壁守护',icon:'🛡',color:'var(--frost)',desc:'先立于不败之地，再谈胜负',cards:['regen','jugg']},
  {title:'狡猾的毒刃行者',icon:'☣',color:'var(--slime)',desc:'不急，慢慢耗死对手',cards:['venom_blade','poison_flask']},
  {title:'诡计多端的暗影行者',icon:'🎭',color:'var(--violet)',desc:'牌多一张，赢面就多一分',cards:['adrenaline','catalyze']},
  {title:'渴血的黑暗贵族',icon:'🧛',color:'var(--blood)',desc:'伤敌亦是养己',cards:['vampire_oath','blood_pact']},
];
function showRunStart(){
  phase=PH.OV;
  window._runStartOpts=shuf(_STARTER_TITLES).slice(0,3);
  window._runStartLegacy=loadLegacy();
  window._runStartSel=null;
  document.getElementById('ovtag').textContent='✦  踏入深渊之前';
  document.getElementById('ovtit').textContent='选择你的称号';
  setSceneArt('🧭','背包已经收拾好，但你想好要以什么身份踏入深渊了吗……');
  renderRunStart();
  showView('ov');renderHud();renderTokens();
}
function renderRunStart(){
  const opts=window._runStartOpts||[];
  const legacy=window._runStartLegacy;
  const sel=window._runStartSel;
  const archHtml=opts.map((a,i)=>{
    const cardNames=a.cards.map(id=>gc(id)?.name||id).join('、');
    const isSel=sel==='a'+i;
    const rot=(i-1)*7;
    return`<div class="ccard${isSel?' cc-sel':''}" style="transform:rotate(${rot}deg) translateY(${Math.abs(rot)*1.2}px)" onclick="selectRunStart('a${i}')">
      <div class="ccard-top" style="background:linear-gradient(90deg,transparent,${a.color},transparent)"></div>
      <div class="ccard-icon">${a.icon}</div>
      <div class="ccard-text" style="color:${a.color}">${a.title}</div>
      <div class="ccard-sub">${a.desc}<br><span style="color:var(--text3)">+${cardNames}</span></div>
    </div>`;
  }).join('');
  const legacyHtml=legacy?`<div class="ccard${sel==='legacy'?' cc-sel':''}" style="transform:rotate(9deg) translateY(11px);border-color:rgba(154,90,191,.5)" onclick="selectRunStart('legacy')">
    <div class="ccard-top" style="background:linear-gradient(90deg,transparent,rgba(154,90,191,.5),transparent)"></div>
    <div class="ccard-icon">⬡</div>
    <div class="ccard-text" style="color:var(--violet)">「${legacy.title}」的继承者</div>
    <div class="ccard-sub">继承 ${legacy.cards.length} 张遗物：${legacy.cards.map(c=>c.name).join('、')}<br><span style="color:var(--gore2)">⚠ 本局难度提升</span></div>
  </div>`:'';
  let confirmHtml='';
  if(sel){
    const isLegacy=sel==='legacy';
    const label=isLegacy?`「${legacy.title}」的继承者`:opts[+sel[1]].title;
    confirmHtml=`<button class="ovbtn gd" style="margin-top:10px" onclick="confirmRunStart()">✓ 就是「${label}」了</button>`;
  }
  const h=`<div class="ovd">这一局，你想以什么称号踏入深渊？（只能选一个）</div>
  <div class="tcards-table">${archHtml}${legacyHtml}</div>
  ${confirmHtml}`;
  document.getElementById('ovb').innerHTML=h;
}
function selectRunStart(key){window._runStartSel=key;renderRunStart();}
function confirmRunStart(){
  const sel=window._runStartSel;if(!sel)return;
  if(sel==='legacy'){
    const legacy=window._runStartLegacy;
    (legacy?.cards||[]).forEach(c=>{if(c)battle.deck.push({...c,isLegacy:true});});
    window._heirMode=true;window._heirParentTitle=legacy?.title||'无名旅者';
    toast(`⬡ 你成为了「${legacy?.title}」的继承者！`,'g');
  }else{
    const a=(window._runStartOpts||[])[+sel[1]];
    if(a){
      a.cards.forEach(id=>{const c=gc(id);if(c)battle.deck.push(c);});
      // 只在第1章显示这个选的称号，之后交给牌组构成自然演变（见 getPlayerTitle）
      window._chosenStartTitle={title:a.title,icon:a.icon,color:a.color};
      toast(`✦ 你选择了成为「${a.title}」！`,'g');
    }
  }
  clearLegacy();
  window._runStartOpts=null;window._runStartLegacy=null;window._runStartSel=null;
  showCutscene('intro',showChapterIntro);
}
// ── 主菜单系统 ──
function showHome(){
  const hasSave=SM.exists();
  const btn=document.getElementById('hv-cont');
  if(btn)btn.disabled=!hasSave;
  document.getElementById('hv-main').style.display='flex';
  document.getElementById('hv-saves').style.display='none';
  showView('hv');
}
function onContAdventure(){
  const saves=SM.listAll().filter(s=>!s.empty);
  if(!saves.length)return;
  if(saves.length===1){loadSlot(saves[0].slot);}
  else{showSaveSelect();}
}
function onNewGame(){
  const all=SM.listAll();
  const empty=all.find(s=>s.empty);
  const slot=empty?empty.slot:all.reduce((a,b)=>((!a.ts||b.ts<a.ts)?b:a)).slot;
  SM._slot=slot;SM.clear(slot);initGame();
}
function showSaveSelect(){
  const saves=SM.listAll();
  const now=Date.now();
  const ago=(ts)=>{
    if(!ts)return'';
    const m=Math.floor((now-ts)/60000);
    if(m<1)return'刚刚';if(m<60)return`${m}分前`;
    const h=Math.floor(m/60);if(h<24)return`${h}时前`;
    return`${Math.floor(h/24)}天前`;
  };
  const wrap=document.getElementById('sv-wrap');
  wrap.innerHTML=saves.map(sv=>sv.empty
    ?`<div class="sv-card sv-empty"><div class="sv-floor">空 档</div><div class="sv-icon">⬜</div><div class="sv-title">暂无存档</div></div>`
    :`<div class="sv-card" onclick="loadSlot(${sv.slot})">
        <div class="sv-floor">第 ${toR(sv.player?.floor||1)} 层</div>
        <div class="sv-icon">${sv.titleIcon||'🗡'}</div>
        <div class="sv-title">${sv.title||'无名旅者'}</div>
        <div class="sv-time">${ago(sv.ts)}</div>
        <button class="sv-del" onclick="event.stopPropagation();deleteSaveSlot(${sv.slot})" title="删除">✕</button>
      </div>`
  ).join('');
  document.getElementById('hv-main').style.display='none';
  document.getElementById('hv-saves').style.display='flex';
}
function loadSlot(n){
  const ok=SM.load(n);
  if(ok){toast('存档已加载','g');}
  else{toast('存档已损坏，已清除','r');SM.clear(n);showSaveSelect();}
}
function deleteSaveSlot(n){
  SM.clear(n);
  if(SM.listAll().every(s=>s.empty)){showHome();}
  else{showSaveSelect();}
}
showHome();
</script>
